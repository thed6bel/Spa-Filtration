blueprint:
  name: "Gestion filtration SPA Bestway Lay-Z-SPA"
  description: >-
    ## Gestion automatique de la filtration du SPA Bestway Lay-Z-SPA

    GÃ¨re automatiquement la filtration en fonction de la tempÃ©rature de l'eau,
    de l'utilisation rÃ©elle (bulles) et de l'Ã©tat du chauffage.

    ### FonctionnalitÃ©s
    - DurÃ©e de filtration adaptÃ©e Ã  la tempÃ©rature (3 paliers configurables)
    - Recalcul Ã  chaque cycle selon la tempÃ©rature actuelle
    - Bonus de filtration basÃ© sur sensor.layzspa_air_time (temps bulles rÃ©el)
    - RÃ©partition en N cycles sur une plage horaire configurable
    - Fonctionne en plage nocturne (ex: 22hâ†’8h) sans coupure Ã  minuit
    - Skip coupure pompe/power si chauffage ou bulles actifs en fin de cycle
    - Cycle bonus automatique en fin de derniÃ¨re session si bulles utilisÃ©es
    - Coupure automatique des bulles aprÃ¨s X minutes (optionnel)
    - Bouton STOP d'urgence
    - VÃ©rification des entitÃ©s manquantes au dÃ©marrage

    ### Installation
    1. Copiez le bloc configuration.yaml fourni dans votre configuration.yaml
    2. RedÃ©marrez Home Assistant
    3. Configurez uniquement les entitÃ©s SPA et les paramÃ¨tres de filtration

  domain: automation
  homeassistant:
    min_version: 2024.8.0

  input:

    entites_spa:
      name: "EntitÃ©s du SPA"
      icon: mdi:hot-tub
      input:
        switch_power:
          name: "Interrupteur principal (power)"
          description: "switch.layzspa_power_switch"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_pompe:
          name: "Interrupteur pompe de filtration"
          description: "switch.layzspa_pump"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        binary_chauffage_actif:
          name: "Capteur chauffage actif"
          description: "binary_sensor.layzspa_heater"
          selector:
            entity:
              filter:
                domain: binary_sensor
              multiple: false

        switch_bulles:
          name: "Interrupteur bulles"
          description: "switch.layzspa_airbubbles"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        sensor_temperature:
          name: "Capteur tempÃ©rature de l'eau"
          description: "sensor.layzspa_temp_c"
          selector:
            entity:
              filter:
                domain: sensor
                device_class: temperature
              multiple: false

        sensor_pump_time:
          name: "Capteur temps de pompe cumulatif (heures)"
          description: "sensor.layzspa_pump_time"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        sensor_air_time:
          name: "Capteur temps de bulles cumulatif (heures)"
          description: "sensor.layzspa_air_time â€” utilisÃ© pour calculer le bonus d'utilisation"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        binary_connexion:
          name: "Capteur de connexion WiFi"
          description: "binary_sensor.layzspa_connection"
          selector:
            entity:
              filter:
                domain: binary_sensor
                device_class: connectivity
              multiple: false

    parametres_filtration:
      name: "ParamÃ¨tres de filtration"
      icon: mdi:water-pump
      input:
        heure_debut:
          name: "Heure de dÃ©but du 1er cycle"
          description: "Pour une plage nocturne : ex 22:00:00 avec heure de fin Ã  08:00:00"
          default: "08:00:00"
          selector:
            time:

        heure_fin:
          name: "Heure de fin de la plage de filtration"
          description: "Si heure_fin < heure_debut, la plage est nocturne (ex: 22hâ†’8h)"
          default: "22:00:00"
          selector:
            time:

        nb_cycles:
          name: "Nombre de cycles par jour"
          description: "La durÃ©e totale est rÃ©partie en N cycles Ã©gaux sur la plage"
          default: 3
          selector:
            number:
              min: 1
              max: 8
              step: 1
              mode: slider

        mode_filtration:
          name: "Mode de filtration"
          description: >
            Automatique : gestion complÃ¨te.
            Ã‰co : durÃ©e divisÃ©e par 2.
            ForcÃ© : pompe toujours active.
            Inactif : SPA Ã©teint.
          default: "Automatique"
          selector:
            select:
              options:
                - "Automatique"
                - "Ã‰co"
                - "ForcÃ©"
                - "Inactif"

        autoriser_extinction:
          name: "Ã‰teindre le SPA entre les cycles et en fin de filtration"
          description: "DÃ©sactivez si vous ne souhaitez pas que le blueprint coupe le power"
          default: true
          selector:
            boolean:

    paliers_temperature:
      name: "DurÃ©es de filtration par tempÃ©rature"
      icon: mdi:thermometer-water
      input:
        seuil_temp_bas:
          name: "Seuil tempÃ©rature basse (Â°C)"
          description: "En dessous de ce seuil : durÃ©e palier bas"
          default: 25
          selector:
            number:
              min: 10
              max: 30
              step: 1
              unit_of_measurement: Â°C
              mode: slider

        duree_palier_bas:
          name: "DurÃ©e palier bas (minutes)"
          description: "DurÃ©e totale quotidienne si tempÃ©rature < seuil bas"
          default: 240
          selector:
            number:
              min: 60
              max: 600
              step: 15
              unit_of_measurement: min
              mode: slider

        seuil_temp_haut:
          name: "Seuil tempÃ©rature haute (Â°C)"
          description: "Au-dessus de ce seuil : durÃ©e palier haut. Entre les deux seuils : durÃ©e palier moyen."
          default: 35
          selector:
            number:
              min: 25
              max: 40
              step: 1
              unit_of_measurement: Â°C
              mode: slider

        duree_palier_moyen:
          name: "DurÃ©e palier moyen (minutes)"
          description: "DurÃ©e totale si seuil bas â‰¤ tempÃ©rature < seuil haut"
          default: 360
          selector:
            number:
              min: 60
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        duree_palier_haut:
          name: "DurÃ©e palier haut (minutes)"
          description: "DurÃ©e totale si tempÃ©rature â‰¥ seuil haut"
          default: 480
          selector:
            number:
              min: 120
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

    bonus_utilisation:
      name: "Bonus de filtration aprÃ¨s utilisation des bulles"
      icon: mdi:account-clock
      input:
        seuil_bonus_long:
          name: "Seuil session longue (minutes)"
          description: "Si temps de bulles >= ce seuil : bonus long. Sinon : bonus court."
          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider

        bonus_court:
          name: "Bonus session courte (minutes)"
          description: "AjoutÃ© si temps de bulles < seuil"
          default: 60
          selector:
            number:
              min: 0
              max: 180
              step: 15
              unit_of_measurement: min
              mode: slider

        bonus_long:
          name: "Bonus session longue (minutes)"
          description: "AjoutÃ© si temps de bulles >= seuil"
          default: 120
          selector:
            number:
              min: 0
              max: 240
              step: 15
              unit_of_measurement: min
              mode: slider

    securite_bulles:
      name: "SÃ©curitÃ© coupure automatique des bulles"
      icon: mdi:timer-off-outline
      input:
        coupure_bulles_auto:
          name: "Couper les bulles automatiquement"
          description: "Si activÃ©, les bulles sont coupÃ©es aprÃ¨s la durÃ©e configurÃ©e (sÃ©curitÃ© enfants / oubli)"
          default: false
          selector:
            boolean:

        duree_max_bulles:
          name: "DurÃ©e maximale des bulles (minutes)"
          description: "Les bulles seront coupÃ©es aprÃ¨s cette durÃ©e si la coupure automatique est activÃ©e"
          default: 45
          selector:
            number:
              min: 15
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider

# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
mode: single
max_exceeded: silent

variables:
  # EntitÃ©s SPA configurables
  v_power:           !input switch_power
  v_pompe:           !input switch_pompe
  v_chauffage_bin:   !input binary_chauffage_actif
  v_bulles:          !input switch_bulles
  v_temp:            !input sensor_temperature
  v_pump_time:       !input sensor_pump_time
  v_air_time:        !input sensor_air_time
  v_connexion:       !input binary_connexion

  # ParamÃ¨tres filtration
  v_nb_cycles:       !input nb_cycles
  v_mode:            !input mode_filtration
  v_autoriser_ext:   !input autoriser_extinction
  v_heure_debut:     !input heure_debut
  v_heure_fin:       !input heure_fin

  # Paliers tempÃ©rature (3 paliers sans interpolation)
  v_seuil_bas:       !input seuil_temp_bas
  v_duree_bas:       !input duree_palier_bas
  v_seuil_haut:      !input seuil_temp_haut
  v_duree_moyen:     !input duree_palier_moyen
  v_duree_haut:      !input duree_palier_haut

  # Bonus utilisation
  v_seuil_bonus:     !input seuil_bonus_long
  v_bonus_court:     !input bonus_court
  v_bonus_long:      !input bonus_long

  # SÃ©curitÃ© bulles
  v_coupure_bulles:  !input coupure_bulles_auto
  v_duree_bulles:    !input duree_max_bulles

  # EntitÃ©s internes en dur â€” correspondent au configuration.yaml fourni
  v_snapshot_pump:   "input_number.spa_snapshot_pump_time"
  v_snapshot_air:    "input_number.spa_snapshot_air_time"
  v_objectif:        "input_number.spa_duree_objectif"
  v_bonus_min:       "input_number.spa_bonus_minutes"
  v_cycle_num:       "input_number.spa_cycle_en_cours"
  v_bool_snapshot:   "input_boolean.spa_snapshot_fait"
  v_bool_stoppe:     "input_boolean.spa_stoppe"

  # Plage horaire en minutes â€” gÃ¨re les plages nocturnes
  v_heure_debut_min: >-
    {% set h = v_heure_debut.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}

  v_heure_fin_min: >-
    {% set h = v_heure_fin.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}

  v_plage_minutes: >-
    {% set d = v_heure_debut_min | int %}
    {% set f = v_heure_fin_min   | int %}
    {{ (f - d) if f > d else (1440 - d) + f }}

triggers:
  - trigger: time
    at: !input heure_debut
    id: "debut_cycle"

  - trigger: state
    entity_id: !input switch_bulles
    to: "on"
    id: "bulles_on"

  - trigger: state
    entity_id: !input switch_bulles
    from: "on"
    to: "off"
    id: "bulles_off"

  - trigger: state
    entity_id: input_button.spa_reset
    id: "reset_manuel"

  - trigger: state
    entity_id: input_button.spa_stop
    id: "stop_urgence"

  - trigger: state
    entity_id: !input binary_connexion
    to: "off"
    id: "connexion_perdue"

  - trigger: state
    entity_id: !input binary_connexion
    from: "off"
    to: "on"
    id: "connexion_retablie"

  - trigger: state
    entity_id: !input switch_power
    to: "on"
    id: "power_on"

conditions: []

actions:

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # STOP D'URGENCE
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  - if:
      - condition: trigger
        id: "stop_urgence"
    then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.spa_stoppe
      - action: homeassistant.turn_off
        target:
          entity_id: !input switch_pompe
      - delay:
          seconds: 5
      - if:
          - condition: state
            entity_id: !input binary_chauffage_actif
            state: "off"
        then:
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_power
          - action: notify.persistent_notification
            data:
              title: "ðŸ›‘ SPA â€” Filtration arrÃªtÃ©e"
              message: "Filtration arrÃªtÃ©e manuellement. Appuyez sur Reset pour relancer."
        else:
          - action: notify.persistent_notification
            data:
              title: "ðŸ›‘ SPA â€” Filtration arrÃªtÃ©e (chauffage actif)"
              message: "Filtration arrÃªtÃ©e. Le chauffage est actif, le power reste allumÃ©."

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # POWER ON â€” snapshot de secours
  # Si le SPA est allumÃ© manuellement avant le 1er cycle
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  - if:
      - condition: trigger
        id: "power_on"
      - condition: state
        entity_id: input_boolean.spa_snapshot_fait
        state: "off"
    then:
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_snapshot_pump_time
        data:
          value: "{{ states(v_pump_time) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_snapshot_air_time
        data:
          value: "{{ states(v_air_time) | float(0) }}"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.spa_snapshot_fait

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # COUPURE AUTOMATIQUE DES BULLES
  # SÃ©curitÃ© enfants / oubli â€” optionnel
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  - if:
      - condition: trigger
        id: "bulles_on"
      - condition: template
        value_template: "{{ v_coupure_bulles }}"
    then:
      - delay:
          minutes: "{{ v_duree_bulles | int }}"
      - if:
          - condition: state
            entity_id: !input switch_bulles
            state: "on"
        then:
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_bulles
          - action: notify.persistent_notification
            data:
              title: "ðŸ’§ SPA â€” Bulles coupÃ©es automatiquement"
              message: "Les bulles ont Ã©tÃ© coupÃ©es aprÃ¨s {{ v_duree_bulles }} minutes."

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # CONNEXION PERDUE
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  - if:
      - condition: trigger
        id: "connexion_perdue"
    then:
      - action: notify.persistent_notification
        data:
          title: "ðŸš¨ SPA â€” Connexion WiFi perdue"
          message: >-
            Connexion perdue en cours de cycle
            ({{ states(v_cycle_num) | int }} / {{ v_nb_cycles }}).
            VÃ©rifiez l'ESP8266.
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_cycle_en_cours
        data:
          value: "{{ v_nb_cycles }}"

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # RETOUR DE CONNEXION â€” cycle de rattrapage
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  - if:
      - condition: trigger
        id: "connexion_retablie"
      - condition: template
        value_template: "{{ v_mode in ['Automatique', 'Ã‰co'] }}"
      - condition: state
        entity_id: input_boolean.spa_stoppe
        state: "off"
    then:
      - variables:
          duree_base_retour: >-
            {% set t = states(v_temp) | float(20) %}
            {% if t < v_seuil_bas %}
              {{ v_duree_bas | int }}
            {% elif t < v_seuil_haut %}
              {{ v_duree_moyen | int }}
            {% else %}
              {{ v_duree_haut | int }}
            {% endif %}
          duree_totale_retour: >-
            {% set base = (duree_base_retour | int / 2) | round(0) | int if v_mode == 'Ã‰co' else duree_base_retour | int %}
            {{ base + (states(v_bonus_min) | float(0) | round(0) | int) }}
          minutes_filtrees_retour: >-
            {% set diff = (states(v_pump_time) | float(0) - states(v_snapshot_pump) | float(0)) * 60 %}
            {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
          minutes_restantes_retour: >-
            {{ [duree_totale_retour | int - minutes_filtrees_retour | int, 0] | max }}
          dans_plage: >-
            {% set n = now().hour * 60 + now().minute %}
            {% set d = v_heure_debut_min | int %}
            {% set f = v_heure_fin_min   | int %}
            {{ (n >= d and n < f) if f > d else (n >= d or n < f) }}

      - if:
          - condition: template
            value_template: "{{ minutes_restantes_retour | int > 0 and dans_plage }}"
        then:
          - action: notify.persistent_notification
            data:
              title: "ðŸ”„ SPA â€” Connexion rÃ©tablie"
              message: "Il reste {{ minutes_restantes_retour }} min Ã  filtrer. Cycle de rattrapage en cours."
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_power
          - delay:
              seconds: 3
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_pompe
          - delay:
              minutes: "{{ minutes_restantes_retour | int }}"
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_pompe
          - if:
              - condition: state
                entity_id: !input binary_chauffage_actif
                state: "off"
              - condition: state
                entity_id: !input switch_bulles
                state: "off"
            then:
              - if:
                  - condition: template
                    value_template: "{{ v_autoriser_ext }}"
                then:
                  - delay:
                      seconds: 5
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_power
        else:
          - action: notify.persistent_notification
            data:
              title: "âœ… SPA â€” Connexion rÃ©tablie"
              message: "Objectif atteint ou hors plage horaire. Aucun rattrapage nÃ©cessaire."

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # RESET MANUEL
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  - if:
      - condition: trigger
        id: "reset_manuel"
    then:
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_bonus_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_cycle_en_cours
        data:
          value: 0
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.spa_snapshot_fait
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.spa_stoppe

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  # BOUCLE PRINCIPALE DE FILTRATION
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  - if:
      - or:
          - condition: trigger
            id: "debut_cycle"
          - condition: trigger
            id: "reset_manuel"
      - condition: state
        entity_id: input_boolean.spa_stoppe
        state: "off"
    then:
      - choose:

          - conditions:
              - "{{ v_mode == 'Inactif' }}"
            sequence:
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_pompe
              - delay:
                  seconds: 5
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_power

          - conditions:
              - "{{ v_mode == 'ForcÃ©' }}"
            sequence:
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_power
              - delay:
                  seconds: 3
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_pompe

          - conditions:
              - "{{ v_mode in ['Automatique', 'Ã‰co'] }}"
            sequence:

              # VÃ©rification connexion
              - if:
                  - condition: state
                    entity_id: !input binary_connexion
                    state: "off"
                then:
                  - action: notify.persistent_notification
                    data:
                      title: "ðŸš¨ SPA â€” Impossible de dÃ©marrer"
                      message: "Le SPA est hors connexion. VÃ©rifiez l'ESP8266."
                  - stop: "SPA hors connexion"

              # VÃ©rification entitÃ©s internes
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_number.spa_snapshot_pump_time') in ['unknown', 'unavailable']
                      or states('input_number.spa_snapshot_air_time') in ['unknown', 'unavailable']
                      or states('input_number.spa_duree_objectif') in ['unknown', 'unavailable']
                      or states('input_number.spa_bonus_minutes') in ['unknown', 'unavailable']
                      or states('input_number.spa_cycle_en_cours') in ['unknown', 'unavailable']
                      or states('input_boolean.spa_snapshot_fait') in ['unknown', 'unavailable']
                      or states('input_boolean.spa_stoppe') in ['unknown', 'unavailable'] }}
                then:
                  - action: notify.persistent_notification
                    data:
                      title: "âš ï¸ SPA â€” EntitÃ©s manquantes"
                      message: >-
                        Une ou plusieurs entitÃ©s internes sont manquantes ou indisponibles.
                        VÃ©rifiez que le bloc configuration.yaml a bien Ã©tÃ© ajoutÃ©
                        et que Home Assistant a Ã©tÃ© redÃ©marrÃ©.
                        EntitÃ©s requises : input_number.spa_snapshot_pump_time,
                        input_number.spa_snapshot_air_time,
                        input_number.spa_duree_objectif,
                        input_number.spa_bonus_minutes,
                        input_number.spa_cycle_en_cours,
                        input_boolean.spa_snapshot_fait,
                        input_boolean.spa_stoppe
                  - stop: "EntitÃ©s manquantes"

              # Snapshot au dÃ©marrage de la session
              - action: input_number.set_value
                target:
                  entity_id: input_number.spa_snapshot_pump_time
                data:
                  value: "{{ states(v_pump_time) | float(0) }}"
              - action: input_number.set_value
                target:
                  entity_id: input_number.spa_snapshot_air_time
                data:
                  value: "{{ states(v_air_time) | float(0) }}"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.spa_snapshot_fait
              - action: input_number.set_value
                target:
                  entity_id: input_number.spa_cycle_en_cours
                data:
                  value: 1

              # â”€â”€ BOUCLE CYCLES â”€â”€
              - repeat:
                  count: "{{ v_nb_cycles | int }}"
                  sequence:

                    - if:
                        - condition: state
                          entity_id: input_boolean.spa_stoppe
                          state: "on"
                      then:
                        - stop: "STOP d'urgence actif"

                    - if:
                        - condition: state
                          entity_id: !input binary_connexion
                          state: "off"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "ðŸš¨ SPA â€” Connexion perdue"
                            message: "Connexion perdue au cycle {{ repeat.index }} / {{ v_nb_cycles }}."
                        - stop: "Connexion perdue"

                    # Recalcul au dÃ©but de chaque cycle
                    - variables:
                        # DurÃ©e selon tempÃ©rature â€” 3 paliers sans interpolation
                        duree_base_cycle: >-
                          {% set t = states(v_temp) | float(20) %}
                          {% if t < v_seuil_bas %}
                            {{ v_duree_bas | int }}
                          {% elif t < v_seuil_haut %}
                            {{ v_duree_moyen | int }}
                          {% else %}
                            {{ v_duree_haut | int }}
                          {% endif %}

                        # Calcul bonus via air_time (temps bulles rÃ©el depuis snapshot)
                        air_time_minutes: >-
                          {% set diff = (states(v_air_time) | float(0) - states('input_number.spa_snapshot_air_time') | float(0)) * 60 %}
                          {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}

                        bonus_minutes: >-
                          {% if air_time_minutes | int >= v_seuil_bonus %}
                            {{ v_bonus_long | int }}
                          {% elif air_time_minutes | int >= 2 %}
                            {{ v_bonus_court | int }}
                          {% else %}
                            0
                          {% endif %}

                        duree_totale_cycle: >-
                          {% set base = (duree_base_cycle | int / 2) | round(0) | int if v_mode == 'Ã‰co' else duree_base_cycle | int %}
                          {{ base + (bonus_minutes | int) }}

                        minutes_filtrees_cycle: >-
                          {% set diff = (states(v_pump_time) | float(0) - states('input_number.spa_snapshot_pump_time') | float(0)) * 60 %}
                          {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}

                        minutes_restantes_cycle: >-
                          {{ [duree_totale_cycle | int - minutes_filtrees_cycle | int, 0] | max }}

                        cycles_restants: >-
                          {{ v_nb_cycles | int - repeat.index | int + 1 }}

                        duree_ce_cycle: >-
                          {{ 0 if minutes_restantes_cycle <= 0 else (minutes_restantes_cycle / cycles_restants) | round(0) | int }}

                        intervalle_entre_cycles: >-
                          {% set pause = ((v_plage_minutes | int - duree_totale_cycle | int) / (v_nb_cycles | int)) | round(0) | int %}
                          {{ [pause, 5] | max }}

                        depasse_heure_fin: >-
                          {% set fin_cycle = now().hour * 60 + now().minute + (duree_ce_cycle | int) %}
                          {% set d = v_heure_debut_min | int %}
                          {% set f = v_heure_fin_min   | int %}
                          {% if f > d %}
                            {{ fin_cycle > f }}
                          {% else %}
                            {% if now().hour * 60 + now().minute >= d %}
                              {{ fin_cycle > 1440 + f }}
                            {% else %}
                              {{ fin_cycle > f }}
                            {% endif %}
                          {% endif %}

                        # Vrai si chauffage ou bulles actifs (skip coupure)
                        skip_coupure: >-
                          {{ states(v_chauffage_bin) == 'on' or states(v_bulles) == 'on' }}

                    # Mise Ã  jour objectif
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.spa_duree_objectif
                      data:
                        value: "{{ duree_totale_cycle | int }}"

                    # Mise Ã  jour bonus enregistrÃ©
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.spa_bonus_minutes
                      data:
                        value: "{{ bonus_minutes | int }}"

                    # DÃ©passement heure de fin
                    - if:
                        - condition: template
                          value_template: "{{ depasse_heure_fin }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "ðŸ•™ SPA â€” Cycle annulÃ©"
                            message: "Le cycle {{ repeat.index }} / {{ v_nb_cycles }} dÃ©passerait l'heure de fin. Session terminÃ©e."
                        - stop: "DÃ©passement heure de fin"

                    # Objectif dÃ©jÃ  atteint
                    - if:
                        - condition: template
                          value_template: "{{ duree_ce_cycle | int <= 0 }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "âœ… SPA â€” Filtration terminÃ©e"
                            message: "Objectif atteint ({{ minutes_filtrees_cycle }} / {{ duree_totale_cycle }} min). Cycles restants annulÃ©s."
                        - if:
                            - condition: state
                              entity_id: !input switch_pompe
                              state: "on"
                            - condition: template
                              value_template: "{{ not skip_coupure }}"
                          then:
                            - action: homeassistant.turn_off
                              target:
                                entity_id: !input switch_pompe
                            - delay:
                                seconds: 5
                        - if:
                            - condition: template
                              value_template: "{{ not skip_coupure and v_autoriser_ext }}"
                          then:
                            - action: homeassistant.turn_off
                              target:
                                entity_id: !input switch_power
                          else:
                            - if:
                                - condition: template
                                  value_template: "{{ skip_coupure }}"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "â™¨ï¸ SPA â€” Filtration terminÃ©e, SPA maintenu"
                                    message: "Objectif atteint. Chauffage ou bulles actifs : le SPA reste allumÃ©."
                        - stop: "Objectif atteint"

                      else:

                        # DÃ©marrage du cycle (si pompe pas dÃ©jÃ  active)
                        - if:
                            - condition: state
                              entity_id: !input switch_power
                              state: "off"
                          then:
                            - action: homeassistant.turn_on
                              target:
                                entity_id: !input switch_power
                            - delay:
                                seconds: 3
                        - if:
                            - condition: state
                              entity_id: !input switch_pompe
                              state: "off"
                          then:
                            - action: homeassistant.turn_on
                              target:
                                entity_id: !input switch_pompe

                        # Filtration pendant la durÃ©e du cycle
                        - delay:
                            minutes: "{{ duree_ce_cycle | int }}"

                        # Mise Ã  jour numÃ©ro de cycle
                        - action: input_number.set_value
                          target:
                            entity_id: input_number.spa_cycle_en_cours
                          data:
                            value: "{{ repeat.index | int }}"

                        # â”€â”€ Fin de cycle â”€â”€
                        - if:
                            - condition: template
                              value_template: "{{ repeat.index == v_nb_cycles | int }}"
                          then:
                            # Dernier cycle â€” vÃ©rifier bonus air_time avant de couper
                            - variables:
                                air_time_final: >-
                                  {% set diff = (states(v_air_time) | float(0) - states('input_number.spa_snapshot_air_time') | float(0)) * 60 %}
                                  {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
                                bonus_final: >-
                                  {% if air_time_final | int >= v_seuil_bonus %}
                                    {{ v_bonus_long | int }}
                                  {% elif air_time_final | int >= 2 %}
                                    {{ v_bonus_court | int }}
                                  {% else %}
                                    0
                                  {% endif %}
                                minutes_filtrees_final: >-
                                  {% set diff = (states(v_pump_time) | float(0) - states('input_number.spa_snapshot_pump_time') | float(0)) * 60 %}
                                  {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
                                duree_base_final: >-
                                  {% set t = states(v_temp) | float(20) %}
                                  {% if t < v_seuil_bas %}
                                    {{ v_duree_bas | int }}
                                  {% elif t < v_seuil_haut %}
                                    {{ v_duree_moyen | int }}
                                  {% else %}
                                    {{ v_duree_haut | int }}
                                  {% endif %}
                                duree_totale_final: >-
                                  {% set base = (duree_base_final | int / 2) | round(0) | int if v_mode == 'Ã‰co' else duree_base_final | int %}
                                  {{ base + (bonus_final | int) }}
                                bonus_restant: >-
                                  {{ [duree_totale_final | int - minutes_filtrees_final | int, 0] | max }}

                            # Cycle bonus si bulles ont Ã©tÃ© utilisÃ©es et temps restant > 0
                            - if:
                                - condition: template
                                  value_template: "{{ bonus_restant | int > 0 and not skip_coupure }}"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "ðŸŠ SPA â€” Cycle bonus en cours"
                                    message: >-
                                      Bulles utilisÃ©es ({{ air_time_final }} min).
                                      Cycle bonus de {{ bonus_restant }} min en cours.
                                - action: homeassistant.turn_on
                                  target:
                                    entity_id: !input switch_pompe
                                - delay:
                                    minutes: "{{ bonus_restant | int }}"
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_pompe

                            # Coupure finale
                            - if:
                                - condition: template
                                  value_template: "{{ skip_coupure }}"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "â™¨ï¸ SPA â€” Filtration terminÃ©e, SPA maintenu"
                                    message: >-
                                      Filtration terminÃ©e ({{ duree_totale_cycle }} min).
                                      Chauffage ou bulles actifs : le SPA reste allumÃ©.
                                      Ã‰teignez-les manuellement pour couper le SPA.
                              else:
                                - if:
                                    - condition: template
                                      value_template: "{{ v_autoriser_ext }}"
                                  then:
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_pompe
                                    - delay:
                                        seconds: 10
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_power

                          else:
                            # Entre deux cycles
                            - if:
                                - condition: template
                                  value_template: "{{ not skip_coupure and v_autoriser_ext }}"
                              then:
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_pompe
                                - delay:
                                    seconds: 5
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_power
                            - delay:
                                minutes: "{{ intervalle_entre_cycles | int }}"
