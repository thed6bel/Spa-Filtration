blueprint:
  name: "Gestion filtration SPA Bestway Lay-Z-SPA v2"
  description: >-
    Gestion automatique filtration SPA Bestway Lay-Z-SPA.
    Duree adaptee a la temperature, bonus bulles, cycles multiples,
    plage nocturne, skip coupure si chauffage actif, watchdog securite.
    Blueprint compagnon spa_bulles_auto_off.yaml requis pour coupure bulles auto.

    Corrections v2.5
    - Variable v_now_min centralisee (calcul heure courant unifie)
    - Fallback temperature KO : si capteur unavailable, utilise le palier haut (securite)
    - Parametre notifications_debug on/off : active les notifs de cycle detaillees
    - Minimum OFF garanti entre cycles (protection pompe et relais)

  domain: automation
  homeassistant:
    min_version: 2024.8.0

  input:
    entites_spa:
      name: "Entites du SPA"
      icon: mdi:hot-tub
      input:
        switch_power:
          name: "Interrupteur principal (power)"
          description: "switch.layzspa_power_switch"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_pompe:
          name: "Interrupteur pompe de filtration"
          description: "switch.layzspa_pump"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        binary_chauffage_actif:
          name: "Capteur chauffage actif"
          description: "binary_sensor.layzspa_heater"
          selector:
            entity:
              filter:
                domain: binary_sensor
              multiple: false

        switch_bulles:
          name: "Interrupteur bulles"
          description: "switch.layzspa_airbubbles"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        sensor_temperature:
          name: "Capteur temperature eau (C)"
          description: "sensor.layzspa_temp_c"
          selector:
            entity:
              filter:
                domain: sensor
                device_class: temperature
              multiple: false

        sensor_pump_time:
          name: "Capteur temps pompe cumulatif (heures)"
          description: "sensor.layzspa_pump_time"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        sensor_air_time:
          name: "Capteur temps bulles cumulatif (heures)"
          description: "sensor.layzspa_air_time"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        binary_connexion:
          name: "Capteur connexion WiFi"
          description: "binary_sensor.layzspa_connection"
          selector:
            entity:
              filter:
                domain: binary_sensor
                device_class: connectivity
              multiple: false

    parametres_filtration:
      name: "Parametres de filtration"
      icon: mdi:water-pump
      input:
        heure_debut:
          name: "Heure de debut"
          default: "08:00:00"
          selector:
            time:

        heure_fin:
          name: "Heure de fin"
          description: "Si heure_fin < heure_debut la plage est nocturne (ex 22h a 8h)"
          default: "22:00:00"
          selector:
            time:

        nb_cycles:
          name: "Nombre de cycles par jour"
          default: 3
          selector:
            number:
              min: 1
              max: 8
              step: 1
              mode: slider

        mode_filtration:
          name: "Mode de filtration"
          description: "Automatique / Eco (duree /2) / Force (pompe toujours ON) / Inactif"
          default: "Automatique"
          selector:
            select:
              options:
                - "Automatique"
                - "Eco"
                - "Force"
                - "Inactif"

        autoriser_extinction:
          name: "Autoriser l extinction entre les cycles"
          default: true
          selector:
            boolean:

        duree_min_cycle:
          name: "Duree minimum par cycle (minutes)"
          description: "Protection pompe : cycle calcule sous ce seuil force a ce minimum. Recommande 15 min."
          default: 15
          selector:
            number:
              min: 5
              max: 30
              step: 5
              unit_of_measurement: min
              mode: slider

        pause_min_off:
          name: "Pause minimum OFF entre cycles (minutes)"
          description: >-
            Temps minimum d arret garanti entre deux cycles, meme si l intervalle calcule
            est plus court. Protege la pompe et les relais. Recommande 5 min.
          default: 5
          selector:
            number:
              min: 2
              max: 15
              step: 1
              unit_of_measurement: min
              mode: slider

    paliers_temperature:
      name: "Durees de filtration par temperature"
      icon: mdi:thermometer-water
      input:
        seuil_temp_bas:
          name: "Seuil temperature basse (C)"
          default: 25
          selector:
            number:
              min: 10
              max: 30
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_bas:
          name: "Duree palier bas (minutes)"
          default: 240
          selector:
            number:
              min: 60
              max: 600
              step: 15
              unit_of_measurement: min
              mode: slider

        seuil_temp_haut:
          name: "Seuil temperature haute (C)"
          default: 35
          selector:
            number:
              min: 25
              max: 40
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_moyen:
          name: "Duree palier moyen (minutes)"
          default: 360
          selector:
            number:
              min: 60
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        duree_palier_haut:
          name: "Duree palier haut (minutes)"
          default: 480
          selector:
            number:
              min: 120
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

    bonus_utilisation:
      name: "Bonus filtration apres utilisation des bulles"
      icon: mdi:account-clock
      input:
        seuil_bonus_court:
          name: "Seuil session courte (minutes)"
          description: "En dessous aucun bonus (anti-accidentel). Recommande 10 min."
          default: 10
          selector:
            number:
              min: 5
              max: 30
              step: 5
              unit_of_measurement: min
              mode: slider

        seuil_bonus_long:
          name: "Seuil session longue (minutes)"
          default: 30
          selector:
            number:
              min: 10
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider

        bonus_court:
          name: "Bonus session courte (minutes)"
          default: 60
          selector:
            number:
              min: 0
              max: 180
              step: 15
              unit_of_measurement: min
              mode: slider

        bonus_long:
          name: "Bonus session longue (minutes)"
          default: 120
          selector:
            number:
              min: 0
              max: 240
              step: 15
              unit_of_measurement: min
              mode: slider

    options_avancees:
      name: "Options avancees"
      icon: mdi:cog-outline
      input:
        watchdog_actif:
          name: "Activer le watchdog"
          description: "Alerte et coupure si pompe ON anormalement longtemps. Recommande activer."
          default: true
          selector:
            boolean:

        watchdog_marge:
          name: "Marge watchdog (minutes)"
          description: "Alerte si pompe ON > duree plage + cette marge."
          default: 60
          selector:
            number:
              min: 15
              max: 180
              step: 15
              unit_of_measurement: min
              mode: slider

        notifications_debug:
          name: "Activer les notifications de cycle (mode debug)"
          description: >-
            Envoie une notification au debut de chaque cycle avec la duree,
            l objectif, la temperature et le bonus actif.
            Utile pour valider le comportement du blueprint.
            Desactivez en usage quotidien pour eviter le spam.
          default: true
          selector:
            boolean:

mode: queued
max: 2
max_exceeded: silent

variables:
  v_power:         !input switch_power
  v_pompe:         !input switch_pompe
  v_chauffage_bin: !input binary_chauffage_actif
  v_bulles:        !input switch_bulles
  v_temp:          !input sensor_temperature
  v_pump_time:     !input sensor_pump_time
  v_air_time:      !input sensor_air_time
  v_connexion:     !input binary_connexion
  v_nb_cycles:     !input nb_cycles
  v_mode:          !input mode_filtration
  v_autoriser_ext: !input autoriser_extinction
  v_heure_debut:   !input heure_debut
  v_heure_fin:     !input heure_fin
  v_duree_min:     !input duree_min_cycle
  v_pause_min_off: !input pause_min_off
  v_seuil_bas:     !input seuil_temp_bas
  v_duree_bas:     !input duree_palier_bas
  v_seuil_haut:    !input seuil_temp_haut
  v_duree_moyen:   !input duree_palier_moyen
  v_duree_haut:    !input duree_palier_haut
  v_seuil_bonus_court: !input seuil_bonus_court
  v_seuil_bonus:       !input seuil_bonus_long
  v_bonus_court:       !input bonus_court
  v_bonus_long:        !input bonus_long
  v_watchdog_actif:      !input watchdog_actif
  v_watchdog_marge:      !input watchdog_marge
  v_notifications_debug: !input notifications_debug
  v_snapshot_pump: "input_number.spa_snapshot_pump_time"
  v_snapshot_air:  "input_number.spa_snapshot_air_time"
  v_objectif:      "input_number.spa_duree_objectif"
  v_bonus_min:     "input_number.spa_bonus_minutes"
  v_cycle_num:     "input_number.spa_cycle_en_cours"

  v_heure_debut_min: >-
    {% set h = v_heure_debut.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}
  v_heure_fin_min: >-
    {% set h = v_heure_fin.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}
  v_plage_minutes: >-
    {% set d = v_heure_debut_min | int %}
    {% set f = v_heure_fin_min | int %}
    {{ (f - d) if f > d else (1440 - d) + f }}

  # v2.5 — heure courante en minutes, calculee une seule fois au demarrage
  # evite de repeter now().hour * 60 + now().minute partout dans le code
  v_now_min: >-
    {{ now().hour * 60 + now().minute }}

triggers:
  - trigger: time
    at: !input heure_debut
    id: debut_cycle

  - trigger: state
    entity_id: !input switch_bulles
    from: "on"
    to: "off"
    id: bulles_off

  - trigger: state
    entity_id: input_button.spa_reset
    id: reset_manuel

  - trigger: state
    entity_id: input_button.spa_stop
    id: stop_urgence

  - trigger: state
    entity_id: !input binary_connexion
    to: "off"
    id: connexion_perdue

  - trigger: state
    entity_id: !input binary_connexion
    from: "off"
    to: "on"
    id: connexion_retablie

  - trigger: state
    entity_id: !input switch_power
    to: "on"
    id: power_on

conditions: []

actions:

  - choose:

      # ══════════════════════════════════════════
      # STOP D'URGENCE
      # ══════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: stop_urgence
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.spa_stoppe
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_pompe
          - delay:
              seconds: 5
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input binary_chauffage_actif
                    state: "off"
                sequence:
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_power
                  - action: notify.persistent_notification
                    data:
                      title: "SPA — Filtration arretee"
                      message: "Filtration arretee manuellement. Appuyez sur Reset pour relancer."
            default:
              - action: notify.persistent_notification
                data:
                  title: "SPA — Filtration arretee (chauffage actif)"
                  message: "Filtration arretee. Chauffage actif, le power reste allume."

      # ══════════════════════════════════════════
      # POWER ON — snapshot de secours UNIQUEMENT
      # ══════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: power_on
          - condition: state
            entity_id: input_boolean.spa_snapshot_fait
            state: "off"
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.spa_snapshot_pump_time
            data:
              value: "{{ states(v_pump_time) | float(0) }}"
          - action: input_number.set_value
            target:
              entity_id: input_number.spa_snapshot_air_time
            data:
              value: "{{ states(v_air_time) | float(0) }}"
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.spa_snapshot_fait

      # ══════════════════════════════════════════
      # CONNEXION PERDUE
      # ══════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: connexion_perdue
        sequence:
          - action: notify.persistent_notification
            data:
              title: "SPA — Connexion WiFi perdue"
              message: >-
                Connexion perdue en cours de cycle
                ({{ states(v_cycle_num) | int }} / {{ v_nb_cycles }}).
                Verifiez l'ESP8266.
          - action: input_number.set_value
            target:
              entity_id: input_number.spa_cycle_en_cours
            data:
              value: "{{ v_nb_cycles }}"

      # ══════════════════════════════════════════
      # RETOUR DE CONNEXION — cycle de rattrapage
      # ══════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: connexion_retablie
          - condition: template
            value_template: "{{ v_mode in ['Automatique', 'Eco'] }}"
          - condition: state
            entity_id: input_boolean.spa_stoppe
            state: "off"
        sequence:
          - variables:
              # v2.5 — fallback temperature KO : si unavailable on prend le palier haut
              temp_retour: >-
                {% set t = states(v_temp) %}
                {% if t in ['unknown', 'unavailable'] %}
                  {{ v_seuil_haut | int }}
                {% else %}
                  {{ t | float(v_seuil_haut) }}
                {% endif %}
              duree_base_retour: >-
                {% if temp_retour | float < v_seuil_bas %}
                  {{ v_duree_bas | int }}
                {% elif temp_retour | float < v_seuil_haut %}
                  {{ v_duree_moyen | int }}
                {% else %}
                  {{ v_duree_haut | int }}
                {% endif %}
              duree_totale_retour: >-
                {% set base = (duree_base_retour | int / 2) | round(0) | int if v_mode == 'Eco' else duree_base_retour | int %}
                {{ base + (states(v_bonus_min) | float(0) | round(0) | int) }}
              minutes_filtrees_retour: >-
                {% set diff = (states(v_pump_time) | float(0) - states(v_snapshot_pump) | float(0)) * 60 %}
                {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
              minutes_restantes_retour: >-
                {{ [duree_totale_retour | int - minutes_filtrees_retour | int, 0] | max }}
              # v2.5 — utilise v_now_min pour coherence
              dans_plage_retour: >-
                {% set n = v_now_min | int %}
                {% set d = v_heure_debut_min | int %}
                {% set f = v_heure_fin_min | int %}
                {{ (n >= d and n < f) if f > d else (n >= d or n < f) }}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ minutes_restantes_retour | int > 0 and dans_plage_retour }}"
                sequence:
                  - action: notify.persistent_notification
                    data:
                      title: "SPA — Connexion retablie"
                      message: "Il reste {{ minutes_restantes_retour }} min a filtrer. Cycle de rattrapage en cours."
                  - action: homeassistant.turn_on
                    target:
                      entity_id: !input switch_power
                  - delay:
                      seconds: 3
                  - action: homeassistant.turn_on
                    target:
                      entity_id: !input switch_pompe
                  - delay:
                      minutes: "{{ minutes_restantes_retour | int }}"
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_pompe
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: !input binary_chauffage_actif
                            state: "off"
                          - condition: state
                            entity_id: !input switch_bulles
                            state: "off"
                          - condition: template
                            value_template: "{{ v_autoriser_ext }}"
                        sequence:
                          - delay:
                              seconds: 5
                          - action: homeassistant.turn_off
                            target:
                              entity_id: !input switch_power
            default:
              - action: notify.persistent_notification
                data:
                  title: "SPA — Connexion retablie"
                  message: "Objectif atteint ou hors plage horaire. Aucun rattrapage necessaire."

      # ══════════════════════════════════════════
      # RESET MANUEL
      # ══════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: reset_manuel
        sequence:
          - action: input_number.set_value
            target:
              entity_id: input_number.spa_bonus_minutes
            data:
              value: 0
          - action: input_number.set_value
            target:
              entity_id: input_number.spa_cycle_en_cours
            data:
              value: 0
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.spa_snapshot_fait
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.spa_stoppe

      # ══════════════════════════════════════════
      # BOUCLE PRINCIPALE — debut_cycle uniquement
      # ══════════════════════════════════════════
      - conditions:
          - condition: trigger
            id: debut_cycle
          - condition: state
            entity_id: input_boolean.spa_stoppe
            state: "off"
        sequence:
          - choose:

              - conditions:
                  - condition: template
                    value_template: "{{ v_mode == 'Inactif' }}"
                sequence:
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_pompe
                  - delay:
                      seconds: 5
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_power

              - conditions:
                  - condition: template
                    value_template: "{{ v_mode == 'Force' }}"
                sequence:
                  - action: homeassistant.turn_on
                    target:
                      entity_id: !input switch_power
                  - delay:
                      seconds: 3
                  - action: homeassistant.turn_on
                    target:
                      entity_id: !input switch_pompe

              - conditions:
                  - condition: template
                    value_template: "{{ v_mode in ['Automatique', 'Eco'] }}"
                sequence:

                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: !input binary_connexion
                            state: "off"
                        sequence:
                          - action: notify.persistent_notification
                            data:
                              title: "SPA — Impossible de demarrer"
                              message: "Le SPA est hors connexion. Verifiez l'ESP8266."
                          - stop: "SPA hors connexion"

                  - choose:
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ states('input_number.spa_snapshot_pump_time') in ['unknown', 'unavailable']
                              or states('input_number.spa_snapshot_air_time') in ['unknown', 'unavailable']
                              or states('input_number.spa_duree_objectif') in ['unknown', 'unavailable']
                              or states('input_number.spa_bonus_minutes') in ['unknown', 'unavailable']
                              or states('input_number.spa_cycle_en_cours') in ['unknown', 'unavailable']
                              or states('input_boolean.spa_snapshot_fait') in ['unknown', 'unavailable']
                              or states('input_boolean.spa_stoppe') in ['unknown', 'unavailable'] }}
                        sequence:
                          - action: notify.persistent_notification
                            data:
                              title: "SPA — Entites manquantes"
                              message: >-
                                Une ou plusieurs entites internes sont manquantes.
                                Verifiez que le bloc configuration.yaml a bien ete ajoute
                                et que Home Assistant a ete redemarre.
                          - stop: "Entites manquantes"

                  # Snapshot de session
                  - action: input_number.set_value
                    target:
                      entity_id: input_number.spa_snapshot_pump_time
                    data:
                      value: "{{ states(v_pump_time) | float(0) }}"
                  - action: input_number.set_value
                    target:
                      entity_id: input_number.spa_snapshot_air_time
                    data:
                      value: "{{ states(v_air_time) | float(0) }}"
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.spa_snapshot_fait
                  - action: input_number.set_value
                    target:
                      entity_id: input_number.spa_cycle_en_cours
                    data:
                      value: 1

                  # ── BOUCLE CYCLES ──
                  - repeat:
                      count: "{{ v_nb_cycles | int }}"
                      sequence:

                        - choose:
                            - conditions:
                                - condition: state
                                  entity_id: input_boolean.spa_stoppe
                                  state: "on"
                              sequence:
                                - stop: "STOP urgence actif"

                        - choose:
                            - conditions:
                                - condition: state
                                  entity_id: !input binary_connexion
                                  state: "off"
                              sequence:
                                - action: notify.persistent_notification
                                  data:
                                    title: "SPA — Connexion perdue"
                                    message: "Connexion perdue au cycle {{ repeat.index }} / {{ v_nb_cycles }}."
                                - stop: "Connexion perdue"

                        # Calcul des variables du cycle
                        - variables:

                            # v2.5 — fallback temperature KO
                            # Si le capteur est unavailable, on prend le palier haut
                            # pour ne pas sous-filtrer une eau potentiellement chaude
                            temp_actuelle: >-
                              {% set t = states(v_temp) %}
                              {% if t in ['unknown', 'unavailable'] %}
                                {{ v_seuil_haut | int }}
                              {% else %}
                                {{ t | float(v_seuil_haut) }}
                              {% endif %}
                            temp_capteur_ko: >-
                              {{ states(v_temp) in ['unknown', 'unavailable'] }}

                            duree_base_cycle: >-
                              {% if temp_actuelle | float < v_seuil_bas %}
                                {{ v_duree_bas | int }}
                              {% elif temp_actuelle | float < v_seuil_haut %}
                                {{ v_duree_moyen | int }}
                              {% else %}
                                {{ v_duree_haut | int }}
                              {% endif %}

                            air_time_minutes: >-
                              {% set diff = (states(v_air_time) | float(0) - states('input_number.spa_snapshot_air_time') | float(0)) * 60 %}
                              {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
                            bonus_minutes: >-
                              {% if air_time_minutes | int >= v_seuil_bonus %}
                                {{ v_bonus_long | int }}
                              {% elif air_time_minutes | int >= v_seuil_bonus_court %}
                                {{ v_bonus_court | int }}
                              {% else %}
                                0
                              {% endif %}
                            duree_totale_cycle: >-
                              {% set base = (duree_base_cycle | int / 2) | round(0) | int if v_mode == 'Eco' else duree_base_cycle | int %}
                              {{ base + (bonus_minutes | int) }}
                            minutes_filtrees_cycle: >-
                              {% set diff = (states(v_pump_time) | float(0) - states('input_number.spa_snapshot_pump_time') | float(0)) * 60 %}
                              {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
                            minutes_restantes_cycle: >-
                              {{ [duree_totale_cycle | int - minutes_filtrees_cycle | int, 0] | max }}
                            cycles_restants: >-
                              {{ v_nb_cycles | int - repeat.index | int + 1 }}
                            duree_ce_cycle_brut: >-
                              {{ 0 if minutes_restantes_cycle <= 0 else (minutes_restantes_cycle / cycles_restants) | round(0) | int }}
                            duree_ce_cycle: >-
                              {% if duree_ce_cycle_brut | int == 0 %}
                                0
                              {% elif duree_ce_cycle_brut | int < v_duree_min | int %}
                                {{ v_duree_min | int }}
                              {% else %}
                                {{ duree_ce_cycle_brut | int }}
                              {% endif %}

                            # v2.5 — intervalle garanti >= v_pause_min_off
                            intervalle_entre_cycles: >-
                              {% set pause = ((v_plage_minutes | int - duree_totale_cycle | int) / (v_nb_cycles | int)) | round(0) | int %}
                              {{ [pause, v_pause_min_off | int] | max }}

                            # v2.5 — utilise v_now_min pour coherence avec les autres calculs
                            depasse_heure_fin: >-
                              {% set fin_cycle = v_now_min | int + (duree_ce_cycle | int) %}
                              {% set d = v_heure_debut_min | int %}
                              {% set f = v_heure_fin_min | int %}
                              {% if f > d %}
                                {{ fin_cycle > f }}
                              {% else %}
                                {% if v_now_min | int >= d %}
                                  {{ fin_cycle > 1440 + f }}
                                {% else %}
                                  {{ fin_cycle > f }}
                                {% endif %}
                              {% endif %}

                            skip_coupure: >-
                              {{ states(v_chauffage_bin) == 'on' or states(v_bulles) == 'on' }}

                        - action: input_number.set_value
                          target:
                            entity_id: input_number.spa_duree_objectif
                          data:
                            value: "{{ duree_totale_cycle | int }}"
                        - action: input_number.set_value
                          target:
                            entity_id: input_number.spa_bonus_minutes
                          data:
                            value: "{{ bonus_minutes | int }}"

                        # Alerte capteur temperature KO (toujours envoyee, pas liee au debug)
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ temp_capteur_ko }}"
                              sequence:
                                - action: notify.persistent_notification
                                  data:
                                    title: "SPA — Capteur temperature indisponible"
                                    message: >-
                                      Le capteur temperature est KO (unavailable).
                                      Filtration en mode securite : palier haut ({{ v_duree_haut }} min).

                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ depasse_heure_fin }}"
                              sequence:
                                - action: notify.persistent_notification
                                  data:
                                    title: "SPA — Cycle annule"
                                    message: "Le cycle {{ repeat.index }}/{{ v_nb_cycles }} depasserait l'heure de fin."
                                - stop: "Depassement heure de fin"

                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ duree_ce_cycle | int <= 0 }}"
                              sequence:
                                - action: notify.persistent_notification
                                  data:
                                    title: "SPA — Filtration terminee"
                                    message: "Objectif atteint ({{ minutes_filtrees_cycle }}/{{ duree_totale_cycle }} min)."
                                - choose:
                                    - conditions:
                                        - condition: state
                                          entity_id: !input switch_pompe
                                          state: "on"
                                        - condition: template
                                          value_template: "{{ not skip_coupure and v_autoriser_ext }}"
                                      sequence:
                                        - action: homeassistant.turn_off
                                          target:
                                            entity_id: !input switch_pompe
                                        - delay:
                                            seconds: 5
                                        - action: homeassistant.turn_off
                                          target:
                                            entity_id: !input switch_power
                                - action: input_boolean.turn_off
                                  target:
                                    entity_id: input_boolean.spa_snapshot_fait
                                - stop: "Objectif atteint"

                        # ── Notification debug demarrage cycle (v2.5) ──
                        # Controlee par le parametre notifications_debug du blueprint
                        # Activee par defaut pour la phase de test, desactivable en production
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ v_notifications_debug }}"
                              sequence:
                                - action: notify.persistent_notification
                                  data:
                                    title: "SPA — Cycle {{ repeat.index }}/{{ v_nb_cycles }} demarre"
                                    message: >-
                                      Duree : {{ duree_ce_cycle }} min.
                                      Objectif session : {{ duree_totale_cycle }} min
                                      ({{ minutes_filtrees_cycle }} min deja filtrees).
                                      Temperature : {{ temp_actuelle }}°C
                                      {% if temp_capteur_ko %}(capteur KO — securite){% endif %}.
                                      {% if bonus_minutes | int > 0 %}Bonus bulles actif : +{{ bonus_minutes }} min.{% endif %}

                        # Demarrage physique
                        - choose:
                            - conditions:
                                - condition: state
                                  entity_id: !input switch_power
                                  state: "off"
                              sequence:
                                - action: homeassistant.turn_on
                                  target:
                                    entity_id: !input switch_power
                                - delay:
                                    seconds: 3
                        - choose:
                            - conditions:
                                - condition: state
                                  entity_id: !input switch_pompe
                                  state: "off"
                              sequence:
                                - action: homeassistant.turn_on
                                  target:
                                    entity_id: !input switch_pompe

                        # Filtration
                        - delay:
                            minutes: "{{ duree_ce_cycle | int }}"

                        - action: input_number.set_value
                          target:
                            entity_id: input_number.spa_cycle_en_cours
                          data:
                            value: "{{ repeat.index | int }}"

                        # ── Fin de cycle ──
                        - choose:

                            # DERNIER CYCLE
                            - conditions:
                                - condition: template
                                  value_template: "{{ repeat.index == v_nb_cycles | int }}"
                              sequence:
                                - variables:
                                    minutes_filtrees_final: >-
                                      {% set diff = (states(v_pump_time) | float(0) - states('input_number.spa_snapshot_pump_time') | float(0)) * 60 %}
                                      {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
                                    bonus_restant: >-
                                      {{ [duree_totale_cycle | int - minutes_filtrees_final | int, 0] | max }}

                                # Cycle bonus si bulles utilisees
                                - choose:
                                    - conditions:
                                        - condition: template
                                          value_template: "{{ bonus_minutes | int > 0 and bonus_restant | int > 0 and not skip_coupure }}"
                                      sequence:
                                        - action: notify.persistent_notification
                                          data:
                                            title: "SPA — Cycle bonus en cours"
                                            message: "Bulles utilisees ({{ air_time_minutes }} min). Cycle bonus de {{ bonus_restant }} min."
                                        - action: homeassistant.turn_on
                                          target:
                                            entity_id: !input switch_pompe
                                        - delay:
                                            minutes: "{{ bonus_restant | int }}"
                                        - action: homeassistant.turn_off
                                          target:
                                            entity_id: !input switch_pompe

                                # Coupure finale
                                - choose:
                                    - conditions:
                                        - condition: template
                                          value_template: "{{ skip_coupure }}"
                                      sequence:
                                        - action: notify.persistent_notification
                                          data:
                                            title: "SPA — Filtration terminee, SPA maintenu"
                                            message: >-
                                              Filtration terminee ({{ duree_totale_cycle }} min).
                                              Chauffage ou bulles actifs : SPA reste allume.
                                              Eteignez manuellement pour couper.

                                    - conditions:
                                        - condition: template
                                          value_template: "{{ v_autoriser_ext }}"
                                      sequence:
                                        - action: notify.persistent_notification
                                          data:
                                            title: "SPA — Session terminee"
                                            message: >-
                                              Filtration terminee ({{ duree_totale_cycle }} min
                                              sur {{ v_plage_minutes }} min de plage).
                                              Pompe et SPA coupes.
                                        - action: homeassistant.turn_off
                                          target:
                                            entity_id: !input switch_pompe
                                        - delay:
                                            seconds: 10
                                        - action: homeassistant.turn_off
                                          target:
                                            entity_id: !input switch_power

                                  default:
                                    - action: notify.persistent_notification
                                      data:
                                        title: "SPA — Session terminee (SPA maintenu)"
                                        message: >-
                                          Filtration terminee ({{ duree_totale_cycle }} min).
                                          Extinction non autorisee : SPA reste allume.

                                # Reset snapshot — propre pour le lendemain
                                - action: input_boolean.turn_off
                                  target:
                                    entity_id: input_boolean.spa_snapshot_fait

                                # Watchdog
                                - choose:
                                    - conditions:
                                        - condition: template
                                          value_template: "{{ v_watchdog_actif }}"
                                      sequence:
                                        - variables:
                                            minutes_reelles: >-
                                              {% set diff = (states(v_pump_time) | float(0) - states('input_number.spa_snapshot_pump_time') | float(0)) * 60 %}
                                              {{ 0 if diff < 0 else diff | round(0) | int }}
                                            seuil_watchdog: >-
                                              {{ v_plage_minutes | int + v_watchdog_marge | int }}
                                        - choose:
                                            - conditions:
                                                - condition: template
                                                  value_template: "{{ minutes_reelles | int > seuil_watchdog | int }}"
                                              sequence:
                                                - action: notify.persistent_notification
                                                  data:
                                                    title: "SPA — Watchdog : pompe anormalement longue"
                                                    message: >-
                                                      Pompe active {{ minutes_reelles }} min
                                                      (seuil {{ seuil_watchdog }} min).
                                                      Coupure de securite effectuee.
                                                - action: homeassistant.turn_off
                                                  target:
                                                    entity_id: !input switch_pompe
                                                - delay:
                                                    seconds: 5
                                                - action: homeassistant.turn_off
                                                  target:
                                                    entity_id: !input switch_power

                          # CYCLE INTERMEDIAIRE
                          default:
                            - choose:
                                - conditions:
                                    - condition: template
                                      value_template: "{{ not skip_coupure and v_autoriser_ext }}"
                                  sequence:
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_pompe
                                    - delay:
                                        seconds: 5
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_power
                            # v2.5 — pause garantie >= v_pause_min_off
                            - delay:
                                minutes: "{{ intervalle_entre_cycles | int }}"
