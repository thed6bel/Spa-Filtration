blueprint:
  name: "Gestion filtration SPA Bestway Lay-Z-SPA"
  description: >-
    ## Gestion automatique de la filtration du SPA Bestway Lay-Z-SPA

    Gère automatiquement la filtration en fonction de la température de l'eau,
    de l'utilisation réelle (bulles) et de l'état du chauffage.

    ### Fonctionnalités
    - Durée de filtration adaptée à la température (3 paliers configurables)
    - Recalcul à chaque cycle selon la température actuelle
    - Bonus de filtration basé sur sensor.layzspa_air_time (temps bulles réel)
    - Répartition en N cycles sur une plage horaire configurable
    - Fonctionne en plage nocturne (ex: 22h→8h) sans coupure à minuit
    - Skip coupure pompe/power si chauffage ou bulles actifs en fin de cycle
    - Cycle bonus automatique en fin de dernière session si bulles utilisées
    - Coupure automatique des bulles après X minutes (optionnel)
    - Bouton STOP d'urgence
    - Vérification des entités manquantes au démarrage

    ### Installation
    1. Copiez le bloc configuration.yaml fourni dans votre configuration.yaml
    2. Redémarrez Home Assistant
    3. Configurez uniquement les entités SPA et les paramètres de filtration

  domain: automation
  homeassistant:
    min_version: 2024.8.0

  input:

    entites_spa:
      name: "Entités du SPA"
      icon: mdi:hot-tub
      input:
        switch_power:
          name: "Interrupteur principal (power)"
          description: "switch.layzspa_power_switch"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_pompe:
          name: "Interrupteur pompe de filtration"
          description: "switch.layzspa_pump"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        binary_chauffage_actif:
          name: "Capteur chauffage actif"
          description: "binary_sensor.layzspa_heater"
          selector:
            entity:
              filter:
                domain: binary_sensor
              multiple: false

        switch_bulles:
          name: "Interrupteur bulles"
          description: "switch.layzspa_airbubbles"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        sensor_temperature:
          name: "Capteur température de l'eau"
          description: "sensor.layzspa_temp_c"
          selector:
            entity:
              filter:
                domain: sensor
                device_class: temperature
              multiple: false

        sensor_pump_time:
          name: "Capteur temps de pompe cumulatif (heures)"
          description: "sensor.layzspa_pump_time"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        sensor_air_time:
          name: "Capteur temps de bulles cumulatif (heures)"
          description: "sensor.layzspa_air_time — utilisé pour calculer le bonus d'utilisation"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        binary_connexion:
          name: "Capteur de connexion WiFi"
          description: "binary_sensor.layzspa_connection"
          selector:
            entity:
              filter:
                domain: binary_sensor
                device_class: connectivity
              multiple: false

    parametres_filtration:
      name: "Paramètres de filtration"
      icon: mdi:water-pump
      input:
        heure_debut:
          name: "Heure de début du 1er cycle"
          description: "Pour une plage nocturne : ex 22:00:00 avec heure de fin à 08:00:00"
          default: "08:00:00"
          selector:
            time:

        heure_fin:
          name: "Heure de fin de la plage de filtration"
          description: "Si heure_fin < heure_debut, la plage est nocturne (ex: 22h→8h)"
          default: "22:00:00"
          selector:
            time:

        nb_cycles:
          name: "Nombre de cycles par jour"
          description: "La durée totale est répartie en N cycles égaux sur la plage"
          default: 3
          selector:
            number:
              min: 1
              max: 8
              step: 1
              mode: slider

        mode_filtration:
          name: "Mode de filtration"
          description: >
            Automatique : gestion complète.
            Éco : durée divisée par 2.
            Forcé : pompe toujours active.
            Inactif : SPA éteint.
          default: "Automatique"
          selector:
            select:
              options:
                - "Automatique"
                - "Éco"
                - "Forcé"
                - "Inactif"

        autoriser_extinction:
          name: "Éteindre le SPA entre les cycles et en fin de filtration"
          description: "Désactivez si vous ne souhaitez pas que le blueprint coupe le power"
          default: true
          selector:
            boolean:

    paliers_temperature:
      name: "Durées de filtration par température"
      icon: mdi:thermometer-water
      input:
        seuil_temp_bas:
          name: "Seuil température basse (°C)"
          description: "En dessous de ce seuil : durée palier bas"
          default: 25
          selector:
            number:
              min: 10
              max: 30
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_bas:
          name: "Durée palier bas (minutes)"
          description: "Durée totale quotidienne si température < seuil bas"
          default: 240
          selector:
            number:
              min: 60
              max: 600
              step: 15
              unit_of_measurement: min
              mode: slider

        seuil_temp_haut:
          name: "Seuil température haute (°C)"
          description: "Au-dessus de ce seuil : durée palier haut. Entre les deux seuils : durée palier moyen."
          default: 35
          selector:
            number:
              min: 25
              max: 40
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_moyen:
          name: "Durée palier moyen (minutes)"
          description: "Durée totale si seuil bas ≤ température < seuil haut"
          default: 360
          selector:
            number:
              min: 60
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        duree_palier_haut:
          name: "Durée palier haut (minutes)"
          description: "Durée totale si température ≥ seuil haut"
          default: 480
          selector:
            number:
              min: 120
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

    bonus_utilisation:
      name: "Bonus de filtration après utilisation des bulles"
      icon: mdi:account-clock
      input:
        seuil_bonus_long:
          name: "Seuil session longue (minutes)"
          description: "Si temps de bulles >= ce seuil : bonus long. Sinon : bonus court."
          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider

        bonus_court:
          name: "Bonus session courte (minutes)"
          description: "Ajouté si temps de bulles < seuil"
          default: 60
          selector:
            number:
              min: 0
              max: 180
              step: 15
              unit_of_measurement: min
              mode: slider

        bonus_long:
          name: "Bonus session longue (minutes)"
          description: "Ajouté si temps de bulles >= seuil"
          default: 120
          selector:
            number:
              min: 0
              max: 240
              step: 15
              unit_of_measurement: min
              mode: slider

    securite_bulles:
      name: "Sécurité coupure automatique des bulles"
      icon: mdi:timer-off-outline
      input:
        coupure_bulles_auto:
          name: "Couper les bulles automatiquement"
          description: "Si activé, les bulles sont coupées après la durée configurée (sécurité enfants / oubli)"
          default: false
          selector:
            boolean:

        duree_max_bulles:
          name: "Durée maximale des bulles (minutes)"
          description: "Les bulles seront coupées après cette durée si la coupure automatique est activée"
          default: 45
          selector:
            number:
              min: 15
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider

# ─────────────────────────────────────────────
mode: single
max_exceeded: silent

variables:
  # Entités SPA configurables
  v_power:           !input switch_power
  v_pompe:           !input switch_pompe
  v_chauffage_bin:   !input binary_chauffage_actif
  v_bulles:          !input switch_bulles
  v_temp:            !input sensor_temperature
  v_pump_time:       !input sensor_pump_time
  v_air_time:        !input sensor_air_time
  v_connexion:       !input binary_connexion

  # Paramètres filtration
  v_nb_cycles:       !input nb_cycles
  v_mode:            !input mode_filtration
  v_autoriser_ext:   !input autoriser_extinction
  v_heure_debut:     !input heure_debut
  v_heure_fin:       !input heure_fin

  # Paliers température (3 paliers sans interpolation)
  v_seuil_bas:       !input seuil_temp_bas
  v_duree_bas:       !input duree_palier_bas
  v_seuil_haut:      !input seuil_temp_haut
  v_duree_moyen:     !input duree_palier_moyen
  v_duree_haut:      !input duree_palier_haut

  # Bonus utilisation
  v_seuil_bonus:     !input seuil_bonus_long
  v_bonus_court:     !input bonus_court
  v_bonus_long:      !input bonus_long

  # Sécurité bulles
  v_coupure_bulles:  !input coupure_bulles_auto
  v_duree_bulles:    !input duree_max_bulles

  # Entités internes en dur — correspondent au configuration.yaml fourni
  v_snapshot_pump:   "input_number.spa_snapshot_pump_time"
  v_snapshot_air:    "input_number.spa_snapshot_air_time"
  v_objectif:        "input_number.spa_duree_objectif"
  v_bonus_min:       "input_number.spa_bonus_minutes"
  v_cycle_num:       "input_number.spa_cycle_en_cours"
  v_bool_snapshot:   "input_boolean.spa_snapshot_fait"
  v_bool_stoppe:     "input_boolean.spa_stoppe"

  # Plage horaire en minutes — gère les plages nocturnes
  v_heure_debut_min: >-
    {% set h = v_heure_debut.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}

  v_heure_fin_min: >-
    {% set h = v_heure_fin.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}

  v_plage_minutes: >-
    {% set d = v_heure_debut_min | int %}
    {% set f = v_heure_fin_min   | int %}
    {{ (f - d) if f > d else (1440 - d) + f }}

triggers:
  - trigger: time
    at: !input heure_debut
    id: "debut_cycle"

  - trigger: state
    entity_id: !input switch_bulles
    to: "on"
    id: "bulles_on"

  - trigger: state
    entity_id: !input switch_bulles
    from: "on"
    to: "off"
    id: "bulles_off"

  - trigger: state
    entity_id: input_button.spa_reset
    id: "reset_manuel"

  - trigger: state
    entity_id: input_button.spa_stop
    id: "stop_urgence"

  - trigger: state
    entity_id: !input binary_connexion
    to: "off"
    id: "connexion_perdue"

  - trigger: state
    entity_id: !input binary_connexion
    from: "off"
    to: "on"
    id: "connexion_retablie"

  - trigger: state
    entity_id: !input switch_power
    to: "on"
    id: "power_on"

conditions: []

actions:

  # ══════════════════════════════════════════
  # STOP D'URGENCE
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "stop_urgence"
    then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.spa_stoppe
      - action: homeassistant.turn_off
        target:
          entity_id: !input switch_pompe
      - delay:
          seconds: 5
      - if:
          - condition: state
            entity_id: !input binary_chauffage_actif
            state: "off"
        then:
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_power
          - action: notify.persistent_notification
            data:
              title: "🛑 SPA — Filtration arrêtée"
              message: "Filtration arrêtée manuellement. Appuyez sur Reset pour relancer."
        else:
          - action: notify.persistent_notification
            data:
              title: "🛑 SPA — Filtration arrêtée (chauffage actif)"
              message: "Filtration arrêtée. Le chauffage est actif, le power reste allumé."

  # ══════════════════════════════════════════
  # POWER ON — snapshot de secours
  # Si le SPA est allumé manuellement avant le 1er cycle
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "power_on"
      - condition: state
        entity_id: input_boolean.spa_snapshot_fait
        state: "off"
    then:
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_snapshot_pump_time
        data:
          value: "{{ states(v_pump_time) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_snapshot_air_time
        data:
          value: "{{ states(v_air_time) | float(0) }}"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.spa_snapshot_fait

  # ══════════════════════════════════════════
  # COUPURE AUTOMATIQUE DES BULLES
  # Sécurité enfants / oubli — optionnel
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "bulles_on"
      - condition: template
        value_template: "{{ v_coupure_bulles }}"
    then:
      - delay:
          minutes: "{{ v_duree_bulles | int }}"
      - if:
          - condition: state
            entity_id: !input switch_bulles
            state: "on"
        then:
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_bulles
          - action: notify.persistent_notification
            data:
              title: "💧 SPA — Bulles coupées automatiquement"
              message: "Les bulles ont été coupées après {{ v_duree_bulles }} minutes."

  # ══════════════════════════════════════════
  # CONNEXION PERDUE
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "connexion_perdue"
    then:
      - action: notify.persistent_notification
        data:
          title: "🚨 SPA — Connexion WiFi perdue"
          message: >-
            Connexion perdue en cours de cycle
            ({{ states(v_cycle_num) | int }} / {{ v_nb_cycles }}).
            Vérifiez l'ESP8266.
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_cycle_en_cours
        data:
          value: "{{ v_nb_cycles }}"

  # ══════════════════════════════════════════
  # RETOUR DE CONNEXION — cycle de rattrapage
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "connexion_retablie"
      - condition: template
        value_template: "{{ v_mode in ['Automatique', 'Éco'] }}"
      - condition: state
        entity_id: input_boolean.spa_stoppe
        state: "off"
    then:
      - variables:
          duree_base_retour: >-
            {% set t = states(v_temp) | float(20) %}
            {% if t < v_seuil_bas %}
              {{ v_duree_bas | int }}
            {% elif t < v_seuil_haut %}
              {{ v_duree_moyen | int }}
            {% else %}
              {{ v_duree_haut | int }}
            {% endif %}
          duree_totale_retour: >-
            {% set base = (duree_base_retour | int / 2) | round(0) | int if v_mode == 'Éco' else duree_base_retour | int %}
            {{ base + (states(v_bonus_min) | float(0) | round(0) | int) }}
          minutes_filtrees_retour: >-
            {% set diff = (states(v_pump_time) | float(0) - states(v_snapshot_pump) | float(0)) * 60 %}
            {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
          minutes_restantes_retour: >-
            {{ [duree_totale_retour | int - minutes_filtrees_retour | int, 0] | max }}
          dans_plage: >-
            {% set n = now().hour * 60 + now().minute %}
            {% set d = v_heure_debut_min | int %}
            {% set f = v_heure_fin_min   | int %}
            {{ (n >= d and n < f) if f > d else (n >= d or n < f) }}

      - if:
          - condition: template
            value_template: "{{ minutes_restantes_retour | int > 0 and dans_plage }}"
        then:
          - action: notify.persistent_notification
            data:
              title: "🔄 SPA — Connexion rétablie"
              message: "Il reste {{ minutes_restantes_retour }} min à filtrer. Cycle de rattrapage en cours."
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_power
          - delay:
              seconds: 3
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_pompe
          - delay:
              minutes: "{{ minutes_restantes_retour | int }}"
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_pompe
          - if:
              - condition: state
                entity_id: !input binary_chauffage_actif
                state: "off"
              - condition: state
                entity_id: !input switch_bulles
                state: "off"
            then:
              - if:
                  - condition: template
                    value_template: "{{ v_autoriser_ext }}"
                then:
                  - delay:
                      seconds: 5
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_power
        else:
          - action: notify.persistent_notification
            data:
              title: "✅ SPA — Connexion rétablie"
              message: "Objectif atteint ou hors plage horaire. Aucun rattrapage nécessaire."

  # ══════════════════════════════════════════
  # RESET MANUEL
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "reset_manuel"
    then:
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_bonus_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: input_number.spa_cycle_en_cours
        data:
          value: 0
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.spa_snapshot_fait
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.spa_stoppe

  # ══════════════════════════════════════════
  # BOUCLE PRINCIPALE DE FILTRATION
  # ══════════════════════════════════════════
  - if:
      - or:
          - condition: trigger
            id: "debut_cycle"
          - condition: trigger
            id: "reset_manuel"
      - condition: state
        entity_id: input_boolean.spa_stoppe
        state: "off"
    then:
      - choose:

          - conditions:
              - "{{ v_mode == 'Inactif' }}"
            sequence:
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_pompe
              - delay:
                  seconds: 5
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_power

          - conditions:
              - "{{ v_mode == 'Forcé' }}"
            sequence:
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_power
              - delay:
                  seconds: 3
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_pompe

          - conditions:
              - "{{ v_mode in ['Automatique', 'Éco'] }}"
            sequence:

              # Vérification connexion
              - if:
                  - condition: state
                    entity_id: !input binary_connexion
                    state: "off"
                then:
                  - action: notify.persistent_notification
                    data:
                      title: "🚨 SPA — Impossible de démarrer"
                      message: "Le SPA est hors connexion. Vérifiez l'ESP8266."
                  - stop: "SPA hors connexion"

              # Vérification entités internes
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_number.spa_snapshot_pump_time') in ['unknown', 'unavailable']
                      or states('input_number.spa_snapshot_air_time') in ['unknown', 'unavailable']
                      or states('input_number.spa_duree_objectif') in ['unknown', 'unavailable']
                      or states('input_number.spa_bonus_minutes') in ['unknown', 'unavailable']
                      or states('input_number.spa_cycle_en_cours') in ['unknown', 'unavailable']
                      or states('input_boolean.spa_snapshot_fait') in ['unknown', 'unavailable']
                      or states('input_boolean.spa_stoppe') in ['unknown', 'unavailable'] }}
                then:
                  - action: notify.persistent_notification
                    data:
                      title: "⚠️ SPA — Entités manquantes"
                      message: >-
                        Une ou plusieurs entités internes sont manquantes ou indisponibles.
                        Vérifiez que le bloc configuration.yaml a bien été ajouté
                        et que Home Assistant a été redémarré.
                        Entités requises : input_number.spa_snapshot_pump_time,
                        input_number.spa_snapshot_air_time,
                        input_number.spa_duree_objectif,
                        input_number.spa_bonus_minutes,
                        input_number.spa_cycle_en_cours,
                        input_boolean.spa_snapshot_fait,
                        input_boolean.spa_stoppe
                  - stop: "Entités manquantes"

              # Snapshot au démarrage de la session
              - action: input_number.set_value
                target:
                  entity_id: input_number.spa_snapshot_pump_time
                data:
                  value: "{{ states(v_pump_time) | float(0) }}"
              - action: input_number.set_value
                target:
                  entity_id: input_number.spa_snapshot_air_time
                data:
                  value: "{{ states(v_air_time) | float(0) }}"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.spa_snapshot_fait
              - action: input_number.set_value
                target:
                  entity_id: input_number.spa_cycle_en_cours
                data:
                  value: 1

              # ── BOUCLE CYCLES ──
              - repeat:
                  count: "{{ v_nb_cycles | int }}"
                  sequence:

                    - if:
                        - condition: state
                          entity_id: input_boolean.spa_stoppe
                          state: "on"
                      then:
                        - stop: "STOP d'urgence actif"

                    - if:
                        - condition: state
                          entity_id: !input binary_connexion
                          state: "off"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "🚨 SPA — Connexion perdue"
                            message: "Connexion perdue au cycle {{ repeat.index }} / {{ v_nb_cycles }}."
                        - stop: "Connexion perdue"

                    # Recalcul au début de chaque cycle
                    - variables:
                        # Durée selon température — 3 paliers sans interpolation
                        duree_base_cycle: >-
                          {% set t = states(v_temp) | float(20) %}
                          {% if t < v_seuil_bas %}
                            {{ v_duree_bas | int }}
                          {% elif t < v_seuil_haut %}
                            {{ v_duree_moyen | int }}
                          {% else %}
                            {{ v_duree_haut | int }}
                          {% endif %}

                        # Calcul bonus via air_time (temps bulles réel depuis snapshot)
                        air_time_minutes: >-
                          {% set diff = (states(v_air_time) | float(0) - states('input_number.spa_snapshot_air_time') | float(0)) * 60 %}
                          {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}

                        bonus_minutes: >-
                          {% if air_time_minutes | int >= v_seuil_bonus %}
                            {{ v_bonus_long | int }}
                          {% elif air_time_minutes | int >= 2 %}
                            {{ v_bonus_court | int }}
                          {% else %}
                            0
                          {% endif %}

                        duree_totale_cycle: >-
                          {% set base = (duree_base_cycle | int / 2) | round(0) | int if v_mode == 'Éco' else duree_base_cycle | int %}
                          {{ base + (bonus_minutes | int) }}

                        minutes_filtrees_cycle: >-
                          {% set diff = (states(v_pump_time) | float(0) - states('input_number.spa_snapshot_pump_time') | float(0)) * 60 %}
                          {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}

                        minutes_restantes_cycle: >-
                          {{ [duree_totale_cycle | int - minutes_filtrees_cycle | int, 0] | max }}

                        cycles_restants: >-
                          {{ v_nb_cycles | int - repeat.index | int + 1 }}

                        duree_ce_cycle: >-
                          {{ 0 if minutes_restantes_cycle <= 0 else (minutes_restantes_cycle / cycles_restants) | round(0) | int }}

                        intervalle_entre_cycles: >-
                          {% set pause = ((v_plage_minutes | int - duree_totale_cycle | int) / (v_nb_cycles | int)) | round(0) | int %}
                          {{ [pause, 5] | max }}

                        depasse_heure_fin: >-
                          {% set fin_cycle = now().hour * 60 + now().minute + (duree_ce_cycle | int) %}
                          {% set d = v_heure_debut_min | int %}
                          {% set f = v_heure_fin_min   | int %}
                          {% if f > d %}
                            {{ fin_cycle > f }}
                          {% else %}
                            {% if now().hour * 60 + now().minute >= d %}
                              {{ fin_cycle > 1440 + f }}
                            {% else %}
                              {{ fin_cycle > f }}
                            {% endif %}
                          {% endif %}

                        # Vrai si chauffage ou bulles actifs (skip coupure)
                        skip_coupure: >-
                          {{ states(v_chauffage_bin) == 'on' or states(v_bulles) == 'on' }}

                    # Mise à jour objectif
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.spa_duree_objectif
                      data:
                        value: "{{ duree_totale_cycle | int }}"

                    # Mise à jour bonus enregistré
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.spa_bonus_minutes
                      data:
                        value: "{{ bonus_minutes | int }}"

                    # Dépassement heure de fin
                    - if:
                        - condition: template
                          value_template: "{{ depasse_heure_fin }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "🕙 SPA — Cycle annulé"
                            message: "Le cycle {{ repeat.index }} / {{ v_nb_cycles }} dépasserait l'heure de fin. Session terminée."
                        - stop: "Dépassement heure de fin"

                    # Objectif déjà atteint
                    - if:
                        - condition: template
                          value_template: "{{ duree_ce_cycle | int <= 0 }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "✅ SPA — Filtration terminée"
                            message: "Objectif atteint ({{ minutes_filtrees_cycle }} / {{ duree_totale_cycle }} min). Cycles restants annulés."
                        - if:
                            - condition: state
                              entity_id: !input switch_pompe
                              state: "on"
                            - condition: template
                              value_template: "{{ not skip_coupure }}"
                          then:
                            - action: homeassistant.turn_off
                              target:
                                entity_id: !input switch_pompe
                            - delay:
                                seconds: 5
                        - if:
                            - condition: template
                              value_template: "{{ not skip_coupure and v_autoriser_ext }}"
                          then:
                            - action: homeassistant.turn_off
                              target:
                                entity_id: !input switch_power
                          else:
                            - if:
                                - condition: template
                                  value_template: "{{ skip_coupure }}"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "♨️ SPA — Filtration terminée, SPA maintenu"
                                    message: "Objectif atteint. Chauffage ou bulles actifs : le SPA reste allumé."
                        - stop: "Objectif atteint"

                      else:

                        # Démarrage du cycle (si pompe pas déjà active)
                        - if:
                            - condition: state
                              entity_id: !input switch_power
                              state: "off"
                          then:
                            - action: homeassistant.turn_on
                              target:
                                entity_id: !input switch_power
                            - delay:
                                seconds: 3
                        - if:
                            - condition: state
                              entity_id: !input switch_pompe
                              state: "off"
                          then:
                            - action: homeassistant.turn_on
                              target:
                                entity_id: !input switch_pompe

                        # Filtration pendant la durée du cycle
                        - delay:
                            minutes: "{{ duree_ce_cycle | int }}"

                        # Mise à jour numéro de cycle
                        - action: input_number.set_value
                          target:
                            entity_id: input_number.spa_cycle_en_cours
                          data:
                            value: "{{ repeat.index | int }}"

                        # ── Fin de cycle ──
                        - if:
                            - condition: template
                              value_template: "{{ repeat.index == v_nb_cycles | int }}"
                          then:
                            # Dernier cycle — vérifier bonus air_time avant de couper
                            - variables:
                                air_time_final: >-
                                  {% set diff = (states(v_air_time) | float(0) - states('input_number.spa_snapshot_air_time') | float(0)) * 60 %}
                                  {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
                                bonus_final: >-
                                  {% if air_time_final | int >= v_seuil_bonus %}
                                    {{ v_bonus_long | int }}
                                  {% elif air_time_final | int >= 2 %}
                                    {{ v_bonus_court | int }}
                                  {% else %}
                                    0
                                  {% endif %}
                                minutes_filtrees_final: >-
                                  {% set diff = (states(v_pump_time) | float(0) - states('input_number.spa_snapshot_pump_time') | float(0)) * 60 %}
                                  {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
                                duree_base_final: >-
                                  {% set t = states(v_temp) | float(20) %}
                                  {% if t < v_seuil_bas %}
                                    {{ v_duree_bas | int }}
                                  {% elif t < v_seuil_haut %}
                                    {{ v_duree_moyen | int }}
                                  {% else %}
                                    {{ v_duree_haut | int }}
                                  {% endif %}
                                duree_totale_final: >-
                                  {% set base = (duree_base_final | int / 2) | round(0) | int if v_mode == 'Éco' else duree_base_final | int %}
                                  {{ base + (bonus_final | int) }}
                                bonus_restant: >-
                                  {{ [duree_totale_final | int - minutes_filtrees_final | int, 0] | max }}

                            # Cycle bonus si bulles ont été utilisées et temps restant > 0
                            - if:
                                - condition: template
                                  value_template: "{{ bonus_final | int > 0 and bonus_restant | int > 0 and not skip_coupure }}"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "🏊 SPA — Cycle bonus en cours"
                                    message: >-
                                      Bulles utilisées ({{ air_time_final }} min).
                                      Cycle bonus de {{ bonus_restant }} min en cours.
                                - action: homeassistant.turn_on
                                  target:
                                    entity_id: !input switch_pompe
                                - delay:
                                    minutes: "{{ bonus_restant | int }}"
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_pompe

                            # Coupure finale
                            - if:
                                - condition: template
                                  value_template: "{{ skip_coupure }}"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "♨️ SPA — Filtration terminée, SPA maintenu"
                                    message: >-
                                      Filtration terminée ({{ duree_totale_cycle }} min).
                                      Chauffage ou bulles actifs : le SPA reste allumé.
                                      Éteignez-les manuellement pour couper le SPA.
                              else:
                                - if:
                                    - condition: template
                                      value_template: "{{ v_autoriser_ext }}"
                                  then:
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_pompe
                                    - delay:
                                        seconds: 10
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_power

                          else:
                            # Entre deux cycles
                            - if:
                                - condition: template
                                  value_template: "{{ not skip_coupure and v_autoriser_ext }}"
                              then:
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_pompe
                                - delay:
                                    seconds: 5
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_power
                            - delay:
                                minutes: "{{ intervalle_entre_cycles | int }}"
