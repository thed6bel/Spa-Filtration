blueprint:
  name: "Gestion filtration SPA Bestway Lay-Z-SPA"
  description: >-
    ## Gestion automatique de la filtration du SPA Bestway Lay-Z-SPA

    Gère automatiquement la filtration en fonction de la température de l'eau,
    de l'utilisation réelle (bulles/jets) et de l'état du chauffage.

    ### Fonctionnalités
    - Durée de filtration adaptée à la température de l'eau
    - Recalcul à chaque début de cycle selon la température actuelle
    - Bonus de filtration après utilisation (bulles/jets)
    - Répartition en N cycles configurables sur la journée
    - Protection anti-débordement minuit (les cycles ne passent pas sur le lendemain)
    - Bouton STOP d'urgence (coupe tout immédiatement)
    - Mode Éco (durée divisée par 2)
    - Mode Forcé (pompe toujours active)
    - Extinction complète après filtration (sauf si chauffage actif)
    - Notifications si chauffage encore actif en fin de filtration
    - Notifications si perte de connexion WiFi en cours de cycle
    - Sécurité snapshot pump_time (prise à minuit, au reset et au 1er allumage du jour)

    ### Entités à créer dans configuration.yaml
    Voir le fichier spa_configuration.yaml fourni avec ce blueprint.

  domain: automation
  homeassistant:
    min_version: 2024.8.0

  input:

    # ─────────────────────────────────────────────
    # ENTITÉS SPA
    # ─────────────────────────────────────────────
    entites_spa:
      name: "Entités du SPA"
      icon: mdi:hot-tub
      input:
        switch_power:
          name: "Interrupteur principal (power)"
          description: "Alimentation complète du SPA — switch.layzspa_power_switch"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_pompe:
          name: "Interrupteur pompe de filtration"
          description: "Pompe de filtration — switch.layzspa_pump"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_chauffage:
          name: "Interrupteur chauffage"
          description: "Régulation du chauffage — switch.layzspa_heat_regulation"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        binary_chauffage_actif:
          name: "Capteur chauffage actif"
          description: "Indique si le chauffage chauffe réellement — binary_sensor.layzspa_heater"
          selector:
            entity:
              filter:
                domain: binary_sensor
              multiple: false

        switch_bulles:
          name: "Interrupteur bulles"
          description: "Bulles — switch.layzspa_airbubbles"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_jets:
          name: "Interrupteur jets"
          description: "Hydrojets — switch.layzspa_jets"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        sensor_temperature:
          name: "Capteur température de l'eau"
          description: "Température de l'eau en °C — sensor.layzspa_temp_c"
          selector:
            entity:
              filter:
                domain: sensor
                device_class: temperature
              multiple: false

        sensor_pump_time:
          name: "Capteur temps de pompe cumulatif"
          description: "Temps total de pompe en heures depuis installation — sensor.layzspa_pump_time"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        binary_connexion:
          name: "Capteur de connexion WiFi"
          description: "Connexion WiFi du SPA — binary_sensor.layzspa_connection"
          selector:
            entity:
              filter:
                domain: binary_sensor
                device_class: connectivity
              multiple: false

    # ─────────────────────────────────────────────
    # PARAMÈTRES DE FILTRATION
    # ─────────────────────────────────────────────
    parametres_filtration:
      name: "Paramètres de filtration"
      icon: mdi:water-pump
      input:
        heure_debut:
          name: "Heure de début du 1er cycle"
          description: "Le premier cycle démarre à cette heure. Les suivants sont répartis uniformément."
          default: "08:00:00"
          selector:
            time:

        nb_cycles:
          name: "Nombre de cycles par jour"
          description: "La durée totale sera répartie en ce nombre de cycles égaux"
          default: 3
          selector:
            number:
              min: 1
              max: 8
              step: 1
              mode: slider

        mode_filtration:
          name: "Mode de filtration"
          description: >
            Automatique : gestion complète selon température et utilisation.
            Éco : durée de filtration divisée par 2.
            Forcé : pompe active en permanence.
            Inactif : aucune filtration, SPA éteint.
          default: "Automatique"
          selector:
            select:
              options:
                - "Automatique"
                - "Éco"
                - "Forcé"
                - "Inactif"

        autoriser_extinction:
          name: "Éteindre le SPA après filtration"
          description: "Si activé, le power du SPA est coupé quand la filtration est terminée (sauf si chauffage actif)"
          default: true
          selector:
            boolean:

    # ─────────────────────────────────────────────
    # DURÉES PAR PALIER DE TEMPÉRATURE
    # ─────────────────────────────────────────────
    paliers_temperature:
      name: "Durées de filtration par température"
      icon: mdi:thermometer-water
      input:
        duree_palier_bas:
          name: "Durée si température basse (minutes)"
          description: "Durée totale quotidienne pour une eau froide (en dessous du seuil moyen)"
          default: 240
          selector:
            number:
              min: 60
              max: 600
              step: 15
              unit_of_measurement: min
              mode: slider

        seuil_temp_moyen:
          name: "Seuil température moyenne (°C)"
          description: "Au-dessus de ce seuil, la durée palier moyen s'applique"
          default: 25
          selector:
            number:
              min: 15
              max: 35
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_moyen_min:
          name: "Durée minimale palier moyen (minutes)"
          description: "Durée minimale pour le palier moyen (atteinte au seuil moyen)"
          default: 300
          selector:
            number:
              min: 60
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        duree_palier_moyen_max:
          name: "Durée maximale palier moyen (minutes)"
          description: "Durée maximale pour le palier moyen (atteinte au seuil haut)"
          default: 420
          selector:
            number:
              min: 60
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        seuil_temp_haut:
          name: "Seuil température haute (°C)"
          description: "Au-dessus de ce seuil, la durée palier haut s'applique"
          default: 30
          selector:
            number:
              min: 20
              max: 40
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_haut_min:
          name: "Durée minimale palier haut (minutes)"
          description: "Durée minimale pour le palier haut (atteinte au seuil haut)"
          default: 420
          selector:
            number:
              min: 120
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        duree_palier_haut_max:
          name: "Durée maximale palier haut (minutes)"
          description: "Durée maximale pour le palier haut (plafond à 35°C)"
          default: 600
          selector:
            number:
              min: 120
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

    # ─────────────────────────────────────────────
    # BONUS UTILISATION
    # ─────────────────────────────────────────────
    bonus_utilisation:
      name: "Bonus de filtration après utilisation"
      icon: mdi:account-clock
      input:
        seuil_utilisation_court:
          name: "Seuil utilisation courte (minutes)"
          description: "En dessous de ce seuil : bonus court. Au-dessus : bonus long."
          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider

        bonus_utilisation_court:
          name: "Bonus filtration utilisation courte (minutes)"
          description: "Durée ajoutée si utilisation < seuil"
          default: 60
          selector:
            number:
              min: 0
              max: 180
              step: 15
              unit_of_measurement: min
              mode: slider

        bonus_utilisation_long:
          name: "Bonus filtration utilisation longue (minutes)"
          description: "Durée ajoutée si utilisation >= seuil"
          default: 120
          selector:
            number:
              min: 0
              max: 240
              step: 15
              unit_of_measurement: min
              mode: slider

    # ─────────────────────────────────────────────
    # ENTITÉS INTERNES (à créer dans configuration.yaml)
    # ─────────────────────────────────────────────
    entites_internes:
      name: "Entités internes (à créer)"
      icon: mdi:database
      input:
        input_snapshot_pump_time:
          name: "Snapshot pump_time début de journée"
          description: "input_number.spa_snapshot_pump_time"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_duree_objectif:
          name: "Durée objectif du jour (minutes)"
          description: "input_number.spa_duree_objectif"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_bonus_minutes:
          name: "Bonus d'utilisation accumulé (minutes)"
          description: "input_number.spa_bonus_minutes"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_cycle_en_cours:
          name: "Numéro du cycle en cours"
          description: "input_number.spa_cycle_en_cours"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_palier_actuel:
          name: "Palier de température actuel (0/1/2)"
          description: "input_number.spa_palier_actuel — 0=bas, 1=moyen, 2=haut"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_utilisation_minutes:
          name: "Temps d'utilisation cumulé aujourd'hui (minutes)"
          description: "input_number.spa_utilisation_minutes"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_bool_utilise:
          name: "SPA utilisé aujourd'hui"
          description: "input_boolean.spa_utilise_aujourdhui"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_bool_bonus_applique:
          name: "Bonus utilisation déjà appliqué aujourd'hui"
          description: "input_boolean.spa_bonus_applique"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_bool_snapshot_fait:
          name: "Snapshot pump_time déjà effectué aujourd'hui"
          description: "input_boolean.spa_snapshot_fait"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_bool_stoppe:
          name: "Filtration suspendue (STOP d'urgence)"
          description: "input_boolean.spa_stoppe — ON = filtration suspendue jusqu'au prochain reset ou minuit"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_datetime_derniere_utilisation:
          name: "Dernière utilisation du SPA"
          description: "input_datetime.spa_derniere_utilisation"
          selector:
            entity:
              filter:
                domain: input_datetime
              multiple: false

        input_button_reset:
          name: "Bouton de reset manuel"
          description: "input_button.spa_reset — relance le calcul et les cycles immédiatement"
          selector:
            entity:
              filter:
                domain: input_button
              multiple: false

        input_button_stop:
          name: "Bouton STOP d'urgence"
          description: "input_button.spa_stop — coupe immédiatement la pompe et le SPA"
          selector:
            entity:
              filter:
                domain: input_button
              multiple: false

# ─────────────────────────────────────────────
# MODE & VARIABLES
# ─────────────────────────────────────────────
mode: queued
max: 10
max_exceeded: silent

variables:
  # Entités SPA
  v_power:              !input switch_power
  v_pompe:              !input switch_pompe
  v_chauffage_sw:       !input switch_chauffage
  v_chauffage_bin:      !input binary_chauffage_actif
  v_bulles:             !input switch_bulles
  v_jets:               !input switch_jets
  v_temp:               !input sensor_temperature
  v_pump_time:          !input sensor_pump_time
  v_connexion:          !input binary_connexion

  # Paramètres
  v_nb_cycles:          !input nb_cycles
  v_mode:               !input mode_filtration
  v_autoriser_ext:      !input autoriser_extinction

  # Paliers
  v_duree_bas:          !input duree_palier_bas
  v_seuil_moyen:        !input seuil_temp_moyen
  v_duree_moyen_min:    !input duree_palier_moyen_min
  v_duree_moyen_max:    !input duree_palier_moyen_max
  v_seuil_haut:         !input seuil_temp_haut
  v_duree_haut_min:     !input duree_palier_haut_min
  v_duree_haut_max:     !input duree_palier_haut_max

  # Bonus
  v_seuil_util:         !input seuil_utilisation_court
  v_bonus_court:        !input bonus_utilisation_court
  v_bonus_long:         !input bonus_utilisation_long

  # Entités internes
  v_snapshot:           !input input_snapshot_pump_time
  v_objectif:           !input input_duree_objectif
  v_bonus_min:          !input input_bonus_minutes
  v_cycle_num:          !input input_cycle_en_cours
  v_palier:             !input input_palier_actuel
  v_util_min:           !input input_utilisation_minutes
  v_bool_util:          !input input_bool_utilise
  v_bool_bonus:         !input input_bool_bonus_applique
  v_bool_snapshot:      !input input_bool_snapshot_fait
  v_bool_stoppe:        !input input_bool_stoppe
  v_dt_util:            !input input_datetime_derniere_utilisation

  # ── Calcul de la durée de base selon température actuelle ──
  v_temp_val: "{{ states(v_temp) | float(20) }}"

  v_duree_base: >-
    {% set t = states(v_temp) | float(20) %}
    {% set seuil_m = v_seuil_moyen | float(25) %}
    {% set seuil_h = v_seuil_haut  | float(30) %}
    {% if t < seuil_m %}
      {{ v_duree_bas | int }}
    {% elif t < seuil_h %}
      {% set ratio = (t - seuil_m) / (seuil_h - seuil_m) %}
      {{ ((v_duree_moyen_min + ratio * (v_duree_moyen_max - v_duree_moyen_min)) | round(0)) | int }}
    {% else %}
      {% set ratio = [(t - seuil_h) / 5, 1] | min %}
      {{ ((v_duree_haut_min + ratio * (v_duree_haut_max - v_duree_haut_min)) | round(0)) | int }}
    {% endif %}

  v_duree_ajustee: >-
    {% if v_mode == 'Éco' %}
      {{ (v_duree_base / 2) | round(0) | int }}
    {% elif v_mode == 'Forcé' %}
      1440
    {% else %}
      {{ v_duree_base | int }}
    {% endif %}

  v_duree_totale: >-
    {{ (v_duree_ajustee | int) + (states(v_bonus_min) | float(0) | round(0) | int) }}

  v_minutes_filtrees: >-
    {% set pump_now  = states(v_pump_time)  | float(0) %}
    {% set pump_snap = states(v_snapshot)   | float(0) %}
    {% set diff_min  = (pump_now - pump_snap) * 60 %}
    {% if diff_min < 0 or diff_min > 1440 %}0{% else %}{{ diff_min | round(0) | int }}{% endif %}

  v_minutes_restantes: >-
    {% set reste = (v_duree_totale | int) - (v_minutes_filtrees | int) %}
    {% if reste < 0 %}0{% else %}{{ reste | int }}{% endif %}

  v_palier_detecte: >-
    {% set t = states(v_temp) | float(20) %}
    {% if t >= v_seuil_haut %}2
    {% elif t >= v_seuil_moyen %}1
    {% else %}0{% endif %}

# ─────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────
triggers:
  # Reset journalier + snapshot à minuit
  - trigger: time
    at: "00:00:00"
    id: "minuit"

  # Heure de démarrage du 1er cycle
  - trigger: time
    at: !input heure_debut
    id: "debut_cycle"

  # Fin d'utilisation bulles
  - trigger: state
    entity_id: !input switch_bulles
    from: "on"
    to: "off"
    id: "fin_bulles"

  # Fin d'utilisation jets
  - trigger: state
    entity_id: !input switch_jets
    from: "on"
    to: "off"
    id: "fin_jets"

  # Reset manuel
  - trigger: state
    entity_id: !input input_button_reset
    id: "reset_manuel"

  # STOP d'urgence
  - trigger: state
    entity_id: !input input_button_stop
    id: "stop_urgence"

  # Connexion perdue en cours de cycle
  - trigger: state
    entity_id: !input binary_connexion
    to: "off"
    id: "connexion_perdue"

  # Retour de connexion — vérifier si des cycles sont encore nécessaires
  - trigger: state
    entity_id: !input binary_connexion
    from: "off"
    to: "on"
    id: "connexion_retablie"

  # Power allumé manuellement — snapshot si première fois du jour
  - trigger: state
    entity_id: !input switch_power
    to: "on"
    id: "power_on"

# ─────────────────────────────────────────────
# CONDITIONS GLOBALES
# ─────────────────────────────────────────────
conditions: []

# ─────────────────────────────────────────────
# ACTIONS
# ─────────────────────────────────────────────
actions:

  # ══════════════════════════════════════════
  # TRIGGER : STOP D'URGENCE
  # Traité EN PREMIER pour réactivité maximale
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "stop_urgence"
    then:
      # Marquer comme suspendu — stoppe la boucle repeat au prochain cycle
      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_stoppe
      # Couper la pompe immédiatement
      - action: homeassistant.turn_off
        target:
          entity_id: !input switch_pompe
      # Attendre que la pompe s'arrête
      - delay:
          seconds: 5
      # Couper le power si chauffage inactif
      - if:
          - condition: state
            entity_id: !input binary_chauffage_actif
            state: "off"
        then:
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_power
          - action: notify.persistent_notification
            data:
              title: "🛑 SPA — Filtration arrêtée"
              message: >-
                La filtration a été arrêtée manuellement.
                Le SPA est éteint. Appuyez sur Reset pour relancer la filtration.
        else:
          - action: notify.persistent_notification
            data:
              title: "🛑 SPA — Filtration arrêtée (chauffage actif)"
              message: >-
                La filtration a été arrêtée manuellement.
                Le chauffage est encore actif : le power reste allumé.
                Éteignez le chauffage pour couper complètement le SPA.

  # ══════════════════════════════════════════
  # TRIGGER : MINUIT — reset journalier
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "minuit"
    then:
      - action: input_number.set_value
        target:
          entity_id: !input input_snapshot_pump_time
        data:
          value: "{{ states(v_pump_time) | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: !input input_bonus_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: !input input_utilisation_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: !input input_cycle_en_cours
        data:
          value: 0
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_utilise
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_bonus_applique
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_stoppe
      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_snapshot_fait

  # ══════════════════════════════════════════
  # TRIGGER : POWER ON — snapshot si pas encore fait
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "power_on"
      - condition: state
        entity_id: !input input_bool_snapshot_fait
        state: "off"
    then:
      - action: input_number.set_value
        target:
          entity_id: !input input_snapshot_pump_time
        data:
          value: "{{ states(v_pump_time) | float(0) }}"
      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_snapshot_fait

  # ══════════════════════════════════════════
  # TRIGGER : CONNEXION PERDUE
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "connexion_perdue"
    then:
      - action: notify.persistent_notification
        data:
          title: "🚨 SPA — Connexion WiFi perdue"
          message: >-
            Le SPA a perdu la connexion WiFi en cours de cycle
            (cycle {{ states(v_cycle_num) | int }} / {{ v_nb_cycles }}).
            Le cycle est considéré comme terminé.
            Vérifiez la connexion de l'ESP8266.
      - action: input_number.set_value
        target:
          entity_id: !input input_cycle_en_cours
        data:
          value: "{{ v_nb_cycles }}"

  # ══════════════════════════════════════════
  # TRIGGER : RETOUR DE CONNEXION
  # Vérifie s'il reste des cycles à faire et les relance si nécessaire
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "connexion_retablie"
      - condition: template
        value_template: "{{ v_mode in ['Automatique', 'Éco'] }}"
      - condition: state
        entity_id: !input input_bool_stoppe
        state: "off"
    then:
      - variables:
          # Recalcul complet au retour de connexion
          temp_retour: "{{ states(v_temp) | float(20) }}"
          duree_base_retour: >-
            {% set t = states(v_temp) | float(20) %}
            {% set seuil_m = v_seuil_moyen | float(25) %}
            {% set seuil_h = v_seuil_haut  | float(30) %}
            {% if t < seuil_m %}
              {{ v_duree_bas | int }}
            {% elif t < seuil_h %}
              {% set ratio = (t - seuil_m) / (seuil_h - seuil_m) %}
              {{ ((v_duree_moyen_min + ratio * (v_duree_moyen_max - v_duree_moyen_min)) | round(0)) | int }}
            {% else %}
              {% set ratio = [(t - seuil_h) / 5, 1] | min %}
              {{ ((v_duree_haut_min + ratio * (v_duree_haut_max - v_duree_haut_min)) | round(0)) | int }}
            {% endif %}
          duree_totale_retour: >-
            {% if v_mode == 'Éco' %}
              {{ ((duree_base_retour | int) / 2) | round(0) | int }}
            {% else %}
              {{ (duree_base_retour | int) + (states(v_bonus_min) | float(0) | round(0) | int) }}
            {% endif %}
          minutes_filtrees_retour: >-
            {% set pump_now  = states(v_pump_time) | float(0) %}
            {% set pump_snap = states(v_snapshot)  | float(0) %}
            {% set diff_min  = (pump_now - pump_snap) * 60 %}
            {% if diff_min < 0 or diff_min > 1440 %}0{% else %}{{ diff_min | round(0) | int }}{% endif %}
          minutes_restantes_retour: >-
            {% set reste = (duree_totale_retour | int) - (minutes_filtrees_retour | int) %}
            {% if reste <= 0 %}0{% else %}{{ reste | int }}{% endif %}
          # Heure actuelle en minutes depuis minuit
          heure_actuelle_min: "{{ now().hour * 60 + now().minute }}"
          # Il reste encore du temps dans la journée (avant 23h50) et des minutes à filtrer
          peut_filtrer: >-
            {{ (minutes_restantes_retour | int) > 0 and (heure_actuelle_min | int) < (23 * 60 + 50) }}

      - if:
          - condition: template
            value_template: "{{ peut_filtrer }}"
        then:
          - action: notify.persistent_notification
            data:
              title: "🔄 SPA — Connexion rétablie, filtration relancée"
              message: >-
                La connexion WiFi est rétablie.
                Il reste {{ minutes_restantes_retour }} min à filtrer.
                Un cycle de rattrapage démarre maintenant.
          # Lancer un cycle de rattrapage unique avec le temps restant
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_power
          - delay:
              seconds: 3
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_pompe
          - delay:
              minutes: "{{ minutes_restantes_retour | int }}"
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_pompe
          - if:
              - condition: state
                entity_id: !input binary_chauffage_actif
                state: "off"
            then:
              - if:
                  - condition: template
                    value_template: "{{ v_autoriser_ext }}"
                then:
                  - delay:
                      seconds: 5
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_power
        else:
          - action: notify.persistent_notification
            data:
              title: "✅ SPA — Connexion rétablie"
              message: >-
                La connexion WiFi est rétablie.
                L'objectif de filtration est déjà atteint ou il est trop tard
                dans la journée pour lancer un nouveau cycle.

  # ══════════════════════════════════════════
  # TRIGGER : FIN BULLES ou JETS — calcul bonus utilisation
  # ══════════════════════════════════════════
  - if:
      - or:
          - condition: trigger
            id: "fin_bulles"
          - condition: trigger
            id: "fin_jets"
      - condition: template
        value_template: "{{ v_mode not in ['Forcé', 'Inactif'] }}"
      # Ne pas traiter si filtration suspendue par STOP
      - condition: state
        entity_id: !input input_bool_stoppe
        state: "off"
    then:
      - variables:
          session_minutes: >-
            {% set debut = trigger.from_state.last_changed %}
            {{ ((now() - debut).total_seconds() / 60) | round(0) | int }}

      - action: input_number.set_value
        target:
          entity_id: !input input_utilisation_minutes
        data:
          value: >-
            {{ (states(v_util_min) | float(0) + session_minutes) | round(0) | int }}

      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_utilise

      - action: input_datetime.set_datetime
        target:
          entity_id: !input input_datetime_derniere_utilisation
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - if:
          - condition: state
            entity_id: !input input_bool_bonus_applique
            state: "off"
        then:
          - variables:
              bonus_a_appliquer: >-
                {% set total_util = states(v_util_min) | float(0) %}
                {% if total_util >= v_seuil_util %}
                  {{ v_bonus_long | int }}
                {% else %}
                  {{ v_bonus_court | int }}
                {% endif %}

          - action: input_number.set_value
            target:
              entity_id: !input input_bonus_minutes
            data:
              value: "{{ bonus_a_appliquer | int }}"

          - action: input_boolean.turn_on
            target:
              entity_id: !input input_bool_bonus_applique

          # Si la pompe est arrêtée, lancer un cycle bonus immédiat
          - if:
              - condition: state
                entity_id: !input switch_pompe
                state: "off"
            then:
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_power
              - delay:
                  seconds: 3
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_pompe
              - delay:
                  minutes: "{{ bonus_a_appliquer | int }}"
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_pompe
              - if:
                  - condition: state
                    entity_id: !input binary_chauffage_actif
                    state: "off"
                then:
                  - if:
                      - condition: template
                        value_template: "{{ v_autoriser_ext }}"
                    then:
                      - delay:
                          seconds: 5
                      - action: homeassistant.turn_off
                        target:
                          entity_id: !input switch_power
                    else:
                      - action: homeassistant.turn_off
                        target:
                          entity_id: !input switch_pompe
                else:
                  - action: notify.persistent_notification
                    data:
                      title: "♨️ SPA — Chauffage encore actif"
                      message: >-
                        Le cycle bonus de filtration est terminé mais le chauffage
                        est encore actif. Le SPA reste allumé.
                        Éteignez le chauffage manuellement pour couper le SPA.

  # ══════════════════════════════════════════
  # TRIGGER : RESET MANUEL
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "reset_manuel"
    then:
      # Snapshot pump_time au moment du reset (référence "début de journée")
      - action: input_number.set_value
        target:
          entity_id: !input input_snapshot_pump_time
        data:
          value: "{{ states(v_pump_time) | float(0) }}"
      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_snapshot_fait
      # Reset des compteurs et flags
      - action: input_number.set_value
        target:
          entity_id: !input input_bonus_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: !input input_utilisation_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: !input input_cycle_en_cours
        data:
          value: 0
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_utilise
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_bonus_applique
      # Lever la suspension STOP si elle était active
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_stoppe

  # ══════════════════════════════════════════
  # TRIGGER : DÉBUT DE CYCLE (heure_debut ou reset_manuel)
  # Boucle principale de filtration
  # ══════════════════════════════════════════
  - if:
      - or:
          - condition: trigger
            id: "debut_cycle"
          - condition: trigger
            id: "reset_manuel"
      # Ne pas démarrer si STOP d'urgence actif
      - condition: state
        entity_id: !input input_bool_stoppe
        state: "off"
    then:
      - choose:

          # ── MODE INACTIF ──
          - conditions:
              - "{{ v_mode == 'Inactif' }}"
            sequence:
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_pompe
              - delay:
                  seconds: 5
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_power

          # ── MODE FORCÉ ──
          - conditions:
              - "{{ v_mode == 'Forcé' }}"
            sequence:
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_power
              - delay:
                  seconds: 3
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_pompe

          # ── MODE AUTOMATIQUE ou ÉCO ──
          - conditions:
              - "{{ v_mode in ['Automatique', 'Éco'] }}"
            sequence:

              # Vérification connexion avant de commencer
              - if:
                  - condition: state
                    entity_id: !input binary_connexion
                    state: "off"
                then:
                  - action: notify.persistent_notification
                    data:
                      title: "🚨 SPA — Impossible de démarrer"
                      message: "Le SPA est hors connexion. Vérifiez l'ESP8266."
                  - stop: "SPA hors connexion"

              # Reset compteur de cycles
              - action: input_number.set_value
                target:
                  entity_id: !input input_cycle_en_cours
                data:
                  value: 1

              # ── BOUCLE SUR LES CYCLES ──
              - repeat:
                  count: "{{ v_nb_cycles | int }}"
                  sequence:

                    # ── VÉRIFICATION STOP avant chaque cycle ──
                    - if:
                        - condition: state
                          entity_id: !input input_bool_stoppe
                          state: "on"
                      then:
                        - stop: "Filtration suspendue par STOP d'urgence"

                    # ── VÉRIFICATION CONNEXION ──
                    - if:
                        - condition: state
                          entity_id: !input binary_connexion
                          state: "off"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "🚨 SPA — Connexion perdue"
                            message: >-
                              Connexion perdue au démarrage du cycle
                              {{ repeat.index }} / {{ v_nb_cycles }}.
                              Cycle ignoré.
                        - stop: "Connexion perdue en début de cycle"

                    # ── Recalcul durée au début de chaque cycle ──
                    - variables:
                        temp_actuelle: "{{ states(v_temp) | float(20) }}"

                        duree_base_cycle: >-
                          {% set t = states(v_temp) | float(20) %}
                          {% set seuil_m = v_seuil_moyen | float(25) %}
                          {% set seuil_h = v_seuil_haut  | float(30) %}
                          {% if t < seuil_m %}
                            {{ v_duree_bas | int }}
                          {% elif t < seuil_h %}
                            {% set ratio = (t - seuil_m) / (seuil_h - seuil_m) %}
                            {{ ((v_duree_moyen_min + ratio * (v_duree_moyen_max - v_duree_moyen_min)) | round(0)) | int }}
                          {% else %}
                            {% set ratio = [(t - seuil_h) / 5, 1] | min %}
                            {{ ((v_duree_haut_min + ratio * (v_duree_haut_max - v_duree_haut_min)) | round(0)) | int }}
                          {% endif %}

                        duree_ajustee_cycle: >-
                          {% if v_mode == 'Éco' %}
                            {{ (duree_base_cycle / 2) | round(0) | int }}
                          {% else %}
                            {{ duree_base_cycle | int }}
                          {% endif %}

                        duree_totale_cycle: >-
                          {{ (duree_ajustee_cycle | int) + (states(v_bonus_min) | float(0) | round(0) | int) }}

                        minutes_filtrees_cycle: >-
                          {% set pump_now  = states(v_pump_time) | float(0) %}
                          {% set pump_snap = states(v_snapshot)  | float(0) %}
                          {% set diff_min  = (pump_now - pump_snap) * 60 %}
                          {% if diff_min < 0 or diff_min > 1440 %}0{% else %}{{ diff_min | round(0) | int }}{% endif %}

                        minutes_restantes_cycle: >-
                          {% set reste = (duree_totale_cycle | int) - (minutes_filtrees_cycle | int) %}
                          {% if reste <= 0 %}0{% else %}{{ reste | int }}{% endif %}

                        cycles_restants: >-
                          {{ (v_nb_cycles | int) - (repeat.index | int) + 1 }}

                        duree_ce_cycle: >-
                          {% if cycles_restants <= 0 or minutes_restantes_cycle <= 0 %}
                            0
                          {% else %}
                            {{ (minutes_restantes_cycle / cycles_restants) | round(0) | int }}
                          {% endif %}

                        intervalle_entre_cycles: >-
                          {% set pause = ((1440 - duree_totale_cycle | int) / (v_nb_cycles | int)) | round(0) | int %}
                          {% if pause < 5 %}5{% else %}{{ pause }}{% endif %}

                        # ── PROTECTION ANTI-DÉBORDEMENT MINUIT ──
                        # Calcule l'heure de fin de ce cycle
                        # Si elle dépasse 23h50, on annule pour ne pas mordre sur demain
                        heure_fin_cycle_minutes: >-
                          {% set h = now().hour %}
                          {% set m = now().minute %}
                          {% set maintenant_min = h * 60 + m %}
                          {{ maintenant_min + (duree_ce_cycle | int) }}

                        depasse_minuit: >-
                          {{ (heure_fin_cycle_minutes | int) > (23 * 60 + 50) }}

                    # Mise à jour durée objectif
                    - action: input_number.set_value
                      target:
                        entity_id: !input input_duree_objectif
                      data:
                        value: "{{ duree_totale_cycle | int }}"

                    # ── Si débordement minuit détecté, on arrête proprement ──
                    - if:
                        - condition: template
                          value_template: "{{ depasse_minuit }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "🌙 SPA — Cycle reporté à demain"
                            message: >-
                              Le cycle {{ repeat.index }} / {{ v_nb_cycles }} aurait dépassé minuit.
                              Il est annulé pour ne pas perturber le calcul de demain.
                              La filtration reprendra normalement demain à l'heure configurée.
                        - stop: "Cycle annulé — débordement minuit"

                    # ── Si rien à filtrer : objectif atteint ──
                    # Couper pompe + power si actifs, et stopper la boucle
                    - if:
                        - condition: template
                          value_template: "{{ duree_ce_cycle | int <= 0 }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "✅ SPA — Filtration terminée"
                            message: >-
                              L'objectif de filtration journalier est atteint
                              ({{ minutes_filtrees_cycle }} min filtrées /
                              {{ duree_totale_cycle }} min objectif).
                              Cycles restants annulés.
                        # Couper la pompe si elle tourne encore (allumée manuellement)
                        - if:
                            - condition: state
                              entity_id: !input switch_pompe
                              state: "on"
                          then:
                            - action: homeassistant.turn_off
                              target:
                                entity_id: !input switch_pompe
                            - delay:
                                seconds: 5
                        # Couper le power si chauffage inactif
                        - if:
                            - condition: state
                              entity_id: !input binary_chauffage_actif
                              state: "off"
                          then:
                            - if:
                                - condition: template
                                  value_template: "{{ v_autoriser_ext }}"
                              then:
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_power
                          else:
                            - action: notify.persistent_notification
                              data:
                                title: "♨️ SPA — Chauffage encore actif"
                                message: >-
                                  Filtration terminée mais le chauffage est actif.
                                  Le SPA reste allumé jusqu'à l'arrêt du chauffage.
                        - stop: "Objectif atteint — cycles restants annulés"
                      else:

                        # ── Démarrage du cycle ──
                        - action: homeassistant.turn_on
                          target:
                            entity_id: !input switch_power
                        - delay:
                            seconds: 3
                        - action: homeassistant.turn_on
                          target:
                            entity_id: !input switch_pompe

                        # Attente de la durée du cycle
                        - delay:
                            minutes: "{{ duree_ce_cycle | int }}"

                        # ── Fin du cycle : arrêt pompe ──
                        - action: homeassistant.turn_off
                          target:
                            entity_id: !input switch_pompe

                        # Mise à jour numéro de cycle
                        - action: input_number.set_value
                          target:
                            entity_id: !input input_cycle_en_cours
                          data:
                            value: "{{ repeat.index | int }}"

                        # ── Dernier cycle : extinction ou notification ──
                        - if:
                            - condition: template
                              value_template: "{{ repeat.index == v_nb_cycles | int }}"
                          then:
                            - if:
                                - condition: state
                                  entity_id: !input binary_chauffage_actif
                                  state: "on"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "♨️ SPA — Filtration terminée, chauffage actif"
                                    message: >-
                                      La filtration journalière est terminée
                                      ({{ duree_totale_cycle }} min).
                                      Le chauffage est encore actif : le SPA reste allumé.
                                      Éteignez le chauffage manuellement pour couper le SPA.
                              else:
                                - if:
                                    - condition: template
                                      value_template: "{{ v_autoriser_ext }}"
                                  then:
                                    - delay:
                                        seconds: 10
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_power
                          else:
                            # Pause entre les cycles (si pas dernier cycle)
                            # Vérification STOP pendant l'intervalle
                            - delay:
                                minutes: "{{ intervalle_entre_cycles | int }}"
