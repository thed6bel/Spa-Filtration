blueprint:
  name: "Gestion filtration SPA Bestway Lay-Z-SPA"
  description: >-
    ## Gestion automatique de la filtration du SPA Bestway Lay-Z-SPA

    Gère automatiquement la filtration en fonction de la température de l'eau,
    de l'utilisation réelle (bulles/jets) et de l'état du chauffage.

    ### Fonctionnalités
    - Durée de filtration adaptée à la température de l'eau (3 paliers interpolés)
    - Recalcul à chaque début de cycle selon la température actuelle
    - Bonus de filtration après utilisation (bulles/jets)
    - Répartition en N cycles sur une plage horaire configurable (ex: 8h→22h ou 22h→8h)
    - Fonctionne en plage nocturne sans coupure à minuit
    - Reset des compteurs au démarrage du 1er cycle
    - Bouton STOP d'urgence
    - Extinction complète entre chaque cycle et en fin de filtration
    - Notifications chauffage actif, perte WiFi, reprise après reconnexion

    ### Entités à créer dans configuration.yaml
    Voir le fichier spa_configuration.yaml fourni avec ce blueprint.

  domain: automation
  homeassistant:
    min_version: 2024.8.0

  input:

    entites_spa:
      name: "Entités du SPA"
      icon: mdi:hot-tub
      input:
        switch_power:
          name: "Interrupteur principal (power)"
          description: "switch.layzspa_power_switch"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_pompe:
          name: "Interrupteur pompe de filtration"
          description: "switch.layzspa_pump"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_chauffage:
          name: "Interrupteur chauffage"
          description: "switch.layzspa_heat_regulation"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        binary_chauffage_actif:
          name: "Capteur chauffage actif"
          description: "binary_sensor.layzspa_heater"
          selector:
            entity:
              filter:
                domain: binary_sensor
              multiple: false

        switch_bulles:
          name: "Interrupteur bulles"
          description: "switch.layzspa_airbubbles"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        switch_jets:
          name: "Interrupteur jets"
          description: "switch.layzspa_jets"
          selector:
            entity:
              filter:
                domain: switch
              multiple: false

        sensor_temperature:
          name: "Capteur température de l'eau"
          description: "sensor.layzspa_temp_c"
          selector:
            entity:
              filter:
                domain: sensor
                device_class: temperature
              multiple: false

        sensor_pump_time:
          name: "Capteur temps de pompe cumulatif (heures)"
          description: "sensor.layzspa_pump_time"
          selector:
            entity:
              filter:
                domain: sensor
              multiple: false

        binary_connexion:
          name: "Capteur de connexion WiFi"
          description: "binary_sensor.layzspa_connection"
          selector:
            entity:
              filter:
                domain: binary_sensor
                device_class: connectivity
              multiple: false

    parametres_filtration:
      name: "Paramètres de filtration"
      icon: mdi:water-pump
      input:
        heure_debut:
          name: "Heure de début du 1er cycle"
          description: "Pour une plage nocturne : ex 22:00:00 avec heure de fin à 08:00:00"
          default: "08:00:00"
          selector:
            time:

        heure_fin:
          name: "Heure de fin de la plage de filtration"
          description: "Si heure_fin < heure_debut, la plage est nocturne (ex: 22h→8h)"
          default: "22:00:00"
          selector:
            time:

        nb_cycles:
          name: "Nombre de cycles par jour"
          description: "La durée totale est répartie en N cycles égaux sur la plage"
          default: 3
          selector:
            number:
              min: 1
              max: 8
              step: 1
              mode: slider

        mode_filtration:
          name: "Mode de filtration"
          description: >
            Automatique : gestion complète.
            Éco : durée divisée par 2.
            Forcé : pompe toujours active.
            Inactif : SPA éteint.
          default: "Automatique"
          selector:
            select:
              options:
                - "Automatique"
                - "Éco"
                - "Forcé"
                - "Inactif"

        autoriser_extinction:
          name: "Éteindre le SPA entre les cycles et en fin de filtration"
          description: "Désactivez si vous ne souhaitez pas que le blueprint coupe le power (ex: chauffage géré manuellement)"
          default: true
          selector:
            boolean:

    paliers_temperature:
      name: "Durées de filtration par température"
      icon: mdi:thermometer-water
      input:
        duree_palier_bas:
          name: "Durée palier bas (minutes)"
          description: "Durée totale quotidienne en dessous du seuil moyen"
          default: 240
          selector:
            number:
              min: 60
              max: 600
              step: 15
              unit_of_measurement: min
              mode: slider

        seuil_temp_moyen:
          name: "Seuil température moyenne (°C)"
          default: 25
          selector:
            number:
              min: 15
              max: 35
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_moyen_min:
          name: "Durée minimale palier moyen (minutes)"
          description: "Atteinte au seuil moyen"
          default: 300
          selector:
            number:
              min: 60
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        duree_palier_moyen_max:
          name: "Durée maximale palier moyen (minutes)"
          description: "Atteinte au seuil haut"
          default: 420
          selector:
            number:
              min: 60
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        seuil_temp_haut:
          name: "Seuil température haute (°C)"
          default: 30
          selector:
            number:
              min: 20
              max: 40
              step: 1
              unit_of_measurement: °C
              mode: slider

        duree_palier_haut_min:
          name: "Durée minimale palier haut (minutes)"
          description: "Atteinte au seuil haut"
          default: 420
          selector:
            number:
              min: 120
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

        duree_palier_haut_max:
          name: "Durée maximale palier haut (minutes)"
          description: "Plafond à 35°C"
          default: 600
          selector:
            number:
              min: 120
              max: 720
              step: 15
              unit_of_measurement: min
              mode: slider

    bonus_utilisation:
      name: "Bonus de filtration après utilisation"
      icon: mdi:account-clock
      input:
        seuil_utilisation_court:
          name: "Seuil session courte (minutes)"
          description: "En dessous : bonus court. Au-dessus : bonus long."
          default: 30
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: min
              mode: slider

        bonus_utilisation_court:
          name: "Bonus session courte (minutes)"
          default: 60
          selector:
            number:
              min: 0
              max: 180
              step: 15
              unit_of_measurement: min
              mode: slider

        bonus_utilisation_long:
          name: "Bonus session longue (minutes)"
          default: 120
          selector:
            number:
              min: 0
              max: 240
              step: 15
              unit_of_measurement: min
              mode: slider

    entites_internes:
      name: "Entités internes (à créer dans configuration.yaml)"
      icon: mdi:database
      input:
        input_snapshot_pump_time:
          name: "Snapshot pump_time début de session"
          description: "input_number.spa_snapshot_pump_time"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_duree_objectif:
          name: "Durée objectif du jour (minutes)"
          description: "input_number.spa_duree_objectif"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_bonus_minutes:
          name: "Bonus d'utilisation accumulé (minutes)"
          description: "input_number.spa_bonus_minutes"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_cycle_en_cours:
          name: "Numéro du cycle en cours"
          description: "input_number.spa_cycle_en_cours"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_utilisation_minutes:
          name: "Temps d'utilisation cumulé (minutes)"
          description: "input_number.spa_utilisation_minutes"
          selector:
            entity:
              filter:
                domain: input_number
              multiple: false

        input_bool_utilise:
          name: "SPA utilisé aujourd'hui"
          description: "input_boolean.spa_utilise_aujourdhui"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_bool_bonus_applique:
          name: "Bonus utilisation déjà appliqué"
          description: "input_boolean.spa_bonus_applique"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_bool_snapshot_fait:
          name: "Snapshot pump_time effectué"
          description: "input_boolean.spa_snapshot_fait"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_bool_stoppe:
          name: "Filtration suspendue (STOP d'urgence)"
          description: "input_boolean.spa_stoppe"
          selector:
            entity:
              filter:
                domain: input_boolean
              multiple: false

        input_datetime_derniere_utilisation:
          name: "Dernière utilisation du SPA"
          description: "input_datetime.spa_derniere_utilisation"
          selector:
            entity:
              filter:
                domain: input_datetime
              multiple: false

        input_button_reset:
          name: "Bouton reset manuel"
          description: "input_button.spa_reset"
          selector:
            entity:
              filter:
                domain: input_button
              multiple: false

        input_button_stop:
          name: "Bouton STOP d'urgence"
          description: "input_button.spa_stop"
          selector:
            entity:
              filter:
                domain: input_button
              multiple: false

# ─────────────────────────────────────────────
mode: single
max_exceeded: silent

variables:
  v_power:           !input switch_power
  v_pompe:           !input switch_pompe
  v_chauffage_bin:   !input binary_chauffage_actif
  v_bulles:          !input switch_bulles
  v_jets:            !input switch_jets
  v_temp:            !input sensor_temperature
  v_pump_time:       !input sensor_pump_time
  v_connexion:       !input binary_connexion
  v_nb_cycles:       !input nb_cycles
  v_mode:            !input mode_filtration
  v_autoriser_ext:   !input autoriser_extinction
  v_heure_debut:     !input heure_debut
  v_heure_fin:       !input heure_fin
  v_duree_bas:       !input duree_palier_bas
  v_seuil_moyen:     !input seuil_temp_moyen
  v_duree_moyen_min: !input duree_palier_moyen_min
  v_duree_moyen_max: !input duree_palier_moyen_max
  v_seuil_haut:      !input seuil_temp_haut
  v_duree_haut_min:  !input duree_palier_haut_min
  v_duree_haut_max:  !input duree_palier_haut_max
  v_seuil_util:      !input seuil_utilisation_court
  v_bonus_court:     !input bonus_utilisation_court
  v_bonus_long:      !input bonus_utilisation_long
  v_snapshot:        !input input_snapshot_pump_time
  v_bonus_min:       !input input_bonus_minutes
  v_cycle_num:       !input input_cycle_en_cours
  v_util_min:        !input input_utilisation_minutes
  v_bool_bonus:      !input input_bool_bonus_applique
  v_bool_snapshot:   !input input_bool_snapshot_fait
  v_bool_stoppe:     !input input_bool_stoppe

  # Plage horaire en minutes — gère les plages nocturnes (heure_fin < heure_debut)
  v_heure_debut_min: >-
    {% set h = v_heure_debut.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}

  v_heure_fin_min: >-
    {% set h = v_heure_fin.split(':') %}
    {{ h[0] | int * 60 + h[1] | int }}

  v_plage_minutes: >-
    {% set debut = v_heure_debut_min | int %}
    {% set fin   = v_heure_fin_min   | int %}
    {{ (fin - debut) if fin > debut else (1440 - debut) + fin }}

# ─────────────────────────────────────────────
# MACRO JINJA — Calcul durée selon température
# Utilisée via include dans chaque contexte qui en a besoin
# ─────────────────────────────────────────────
# Note : Jinja2 dans HA ne supporte pas les macros cross-templates.
# Le calcul est donc défini une fois ici en commentaire pour référence,
# et inliné dans les 2 endroits qui l'utilisent (boucle + retour connexion)
# via la variable v_duree_base_template ci-dessous.
#
# Formule : interpolation linéaire entre paliers selon la température de l'eau.
# Palier bas  : t < seuil_moyen → duree_bas (fixe)
# Palier moyen: seuil_moyen ≤ t < seuil_haut → interpolation min→max
# Palier haut : t ≥ seuil_haut → interpolation min→max (plafond à 35°C)

triggers:
  - trigger: time
    at: !input heure_debut
    id: "debut_cycle"

  - trigger: state
    entity_id: !input switch_bulles
    from: "on"
    to: "off"
    id: "fin_bulles"

  - trigger: state
    entity_id: !input switch_jets
    from: "on"
    to: "off"
    id: "fin_jets"

  - trigger: state
    entity_id: !input input_button_reset
    id: "reset_manuel"

  - trigger: state
    entity_id: !input input_button_stop
    id: "stop_urgence"

  - trigger: state
    entity_id: !input binary_connexion
    to: "off"
    id: "connexion_perdue"

  - trigger: state
    entity_id: !input binary_connexion
    from: "off"
    to: "on"
    id: "connexion_retablie"

  - trigger: state
    entity_id: !input switch_power
    to: "on"
    id: "power_on"

conditions: []

actions:

  # ══════════════════════════════════════════
  # STOP D'URGENCE
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "stop_urgence"
    then:
      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_stoppe
      - action: homeassistant.turn_off
        target:
          entity_id: !input switch_pompe
      - delay:
          seconds: 5
      - if:
          - condition: state
            entity_id: !input binary_chauffage_actif
            state: "off"
        then:
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_power
          - action: notify.persistent_notification
            data:
              title: "🛑 SPA — Filtration arrêtée"
              message: "Filtration arrêtée manuellement. Appuyez sur Reset pour relancer."
        else:
          - action: notify.persistent_notification
            data:
              title: "🛑 SPA — Filtration arrêtée (chauffage actif)"
              message: "Filtration arrêtée. Le chauffage est actif, le power reste allumé."

  # ══════════════════════════════════════════
  # POWER ON — snapshot de secours
  # Utilisé uniquement si le SPA est allumé manuellement
  # avant le 1er cycle (snapshot pas encore pris par la boucle)
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "power_on"
      - condition: state
        entity_id: !input input_bool_snapshot_fait
        state: "off"
    then:
      - action: input_number.set_value
        target:
          entity_id: !input input_snapshot_pump_time
        data:
          value: "{{ states(v_pump_time) | float(0) }}"
      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_snapshot_fait

  # ══════════════════════════════════════════
  # CONNEXION PERDUE
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "connexion_perdue"
    then:
      - action: notify.persistent_notification
        data:
          title: "🚨 SPA — Connexion WiFi perdue"
          message: >-
            Connexion perdue en cours de cycle
            ({{ states(v_cycle_num) | int }} / {{ v_nb_cycles }}).
            Vérifiez l'ESP8266.
      - action: input_number.set_value
        target:
          entity_id: !input input_cycle_en_cours
        data:
          value: "{{ v_nb_cycles }}"

  # ══════════════════════════════════════════
  # RETOUR DE CONNEXION — cycle de rattrapage
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "connexion_retablie"
      - condition: template
        value_template: "{{ v_mode in ['Automatique', 'Éco'] }}"
      - condition: state
        entity_id: !input input_bool_stoppe
        state: "off"
    then:
      - variables:
          # Calcul durée selon température (identique à la boucle principale)
          duree_base_retour: >-
            {% set t = states(v_temp) | float(20) %}
            {% set sm = v_seuil_moyen | float(25) %}
            {% set sh = v_seuil_haut  | float(30) %}
            {% if t < sm %}
              {{ v_duree_bas | int }}
            {% elif t < sh %}
              {{ ((v_duree_moyen_min + (t - sm) / (sh - sm) * (v_duree_moyen_max - v_duree_moyen_min)) | round(0)) | int }}
            {% else %}
              {{ ((v_duree_haut_min + ([( t - sh) / 5, 1] | min) * (v_duree_haut_max - v_duree_haut_min)) | round(0)) | int }}
            {% endif %}
          duree_totale_retour: >-
            {% set base = (duree_base_retour | int / 2) | round(0) | int if v_mode == 'Éco' else duree_base_retour | int %}
            {{ base + (states(v_bonus_min) | float(0) | round(0) | int) }}
          minutes_filtrees_retour: >-
            {% set diff = (states(v_pump_time) | float(0) - states(v_snapshot) | float(0)) * 60 %}
            {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}
          minutes_restantes_retour: >-
            {{ [duree_totale_retour | int - minutes_filtrees_retour | int, 0] | max }}
          dans_plage: >-
            {% set n = now().hour * 60 + now().minute %}
            {% set d = v_heure_debut_min | int %}
            {% set f = v_heure_fin_min   | int %}
            {{ (n >= d and n < f) if f > d else (n >= d or n < f) }}

      - if:
          - condition: template
            value_template: "{{ minutes_restantes_retour | int > 0 and dans_plage }}"
        then:
          - action: notify.persistent_notification
            data:
              title: "🔄 SPA — Connexion rétablie"
              message: "Il reste {{ minutes_restantes_retour }} min à filtrer. Cycle de rattrapage en cours."
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_power
          - delay:
              seconds: 3
          - action: homeassistant.turn_on
            target:
              entity_id: !input switch_pompe
          - delay:
              minutes: "{{ minutes_restantes_retour | int }}"
          - action: homeassistant.turn_off
            target:
              entity_id: !input switch_pompe
          - if:
              - condition: state
                entity_id: !input binary_chauffage_actif
                state: "off"
            then:
              - if:
                  - condition: template
                    value_template: "{{ v_autoriser_ext }}"
                then:
                  - delay:
                      seconds: 5
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input switch_power
        else:
          - action: notify.persistent_notification
            data:
              title: "✅ SPA — Connexion rétablie"
              message: "Objectif atteint ou hors plage horaire. Aucun cycle de rattrapage nécessaire."

  # ══════════════════════════════════════════
  # FIN BULLES / JETS — enregistrement utilisation et bonus
  # Le bonus est intégré au prochain recalcul de cycle
  # ══════════════════════════════════════════
  - if:
      - or:
          - condition: trigger
            id: "fin_bulles"
          - condition: trigger
            id: "fin_jets"
      - condition: template
        value_template: "{{ v_mode not in ['Forcé', 'Inactif'] }}"
      - condition: state
        entity_id: !input input_bool_stoppe
        state: "off"
    then:
      - variables:
          session_minutes: >-
            {{ ((now() - trigger.from_state.last_changed).total_seconds() / 60) | round(0) | int }}

      - action: input_number.set_value
        target:
          entity_id: !input input_utilisation_minutes
        data:
          value: "{{ (states(v_util_min) | float(0) + session_minutes) | round(0) | int }}"

      - action: input_boolean.turn_on
        target:
          entity_id: !input input_bool_utilise

      - action: input_datetime.set_datetime
        target:
          entity_id: !input input_datetime_derniere_utilisation
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - if:
          - condition: state
            entity_id: !input input_bool_bonus_applique
            state: "off"
        then:
          - variables:
              bonus_a_appliquer: >-
                {{ v_bonus_long | int if states(v_util_min) | float(0) >= v_seuil_util else v_bonus_court | int }}

          - action: input_number.set_value
            target:
              entity_id: !input input_bonus_minutes
            data:
              value: "{{ bonus_a_appliquer | int }}"

          - action: input_boolean.turn_on
            target:
              entity_id: !input input_bool_bonus_applique

          - action: notify.persistent_notification
            data:
              title: "🏊 SPA — Bonus filtration enregistré"
              message: "Session de {{ session_minutes }} min détectée. Bonus de {{ bonus_a_appliquer }} min ajouté au prochain cycle."

  # ══════════════════════════════════════════
  # RESET MANUEL
  # ══════════════════════════════════════════
  - if:
      - condition: trigger
        id: "reset_manuel"
    then:
      - action: input_number.set_value
        target:
          entity_id: !input input_bonus_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: !input input_utilisation_minutes
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: !input input_cycle_en_cours
        data:
          value: 0
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_utilise
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_bonus_applique
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_snapshot_fait
      - action: input_boolean.turn_off
        target:
          entity_id: !input input_bool_stoppe

  # ══════════════════════════════════════════
  # BOUCLE PRINCIPALE DE FILTRATION
  # Déclenchée à heure_debut ou par reset_manuel
  # ══════════════════════════════════════════
  - if:
      - or:
          - condition: trigger
            id: "debut_cycle"
          - condition: trigger
            id: "reset_manuel"
      - condition: state
        entity_id: !input input_bool_stoppe
        state: "off"
    then:
      - choose:

          - conditions:
              - "{{ v_mode == 'Inactif' }}"
            sequence:
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_pompe
              - delay:
                  seconds: 5
              - action: homeassistant.turn_off
                target:
                  entity_id: !input switch_power

          - conditions:
              - "{{ v_mode == 'Forcé' }}"
            sequence:
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_power
              - delay:
                  seconds: 3
              - action: homeassistant.turn_on
                target:
                  entity_id: !input switch_pompe

          - conditions:
              - "{{ v_mode in ['Automatique', 'Éco'] }}"
            sequence:

              - if:
                  - condition: state
                    entity_id: !input binary_connexion
                    state: "off"
                then:
                  - action: notify.persistent_notification
                    data:
                      title: "🚨 SPA — Impossible de démarrer"
                      message: "Le SPA est hors connexion. Vérifiez l'ESP8266."
                  - stop: "SPA hors connexion"

              # Snapshot pris ici — référence propre pour toute la session
              - action: input_number.set_value
                target:
                  entity_id: !input input_snapshot_pump_time
                data:
                  value: "{{ states(v_pump_time) | float(0) }}"
              - action: input_boolean.turn_on
                target:
                  entity_id: !input input_bool_snapshot_fait
              - action: input_number.set_value
                target:
                  entity_id: !input input_cycle_en_cours
                data:
                  value: 1

              - repeat:
                  count: "{{ v_nb_cycles | int }}"
                  sequence:

                    # Vérifications préalables
                    - if:
                        - condition: state
                          entity_id: !input input_bool_stoppe
                          state: "on"
                      then:
                        - stop: "STOP d'urgence actif"

                    - if:
                        - condition: state
                          entity_id: !input binary_connexion
                          state: "off"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "🚨 SPA — Connexion perdue"
                            message: "Connexion perdue au cycle {{ repeat.index }} / {{ v_nb_cycles }}."
                        - stop: "Connexion perdue"

                    # Recalcul au début de chaque cycle
                    - variables:
                        # Durée selon température — interpolation linéaire par paliers
                        duree_base_cycle: >-
                          {% set t  = states(v_temp) | float(20) %}
                          {% set sm = v_seuil_moyen | float(25) %}
                          {% set sh = v_seuil_haut  | float(30) %}
                          {% if t < sm %}
                            {{ v_duree_bas | int }}
                          {% elif t < sh %}
                            {{ ((v_duree_moyen_min + (t - sm) / (sh - sm) * (v_duree_moyen_max - v_duree_moyen_min)) | round(0)) | int }}
                          {% else %}
                            {{ ((v_duree_haut_min + ([(t - sh) / 5, 1] | min) * (v_duree_haut_max - v_duree_haut_min)) | round(0)) | int }}
                          {% endif %}

                        duree_totale_cycle: >-
                          {% set base = (duree_base_cycle | int / 2) | round(0) | int if v_mode == 'Éco' else duree_base_cycle | int %}
                          {{ base + (states(v_bonus_min) | float(0) | round(0) | int) }}

                        minutes_filtrees_cycle: >-
                          {% set diff = (states(v_pump_time) | float(0) - states(v_snapshot) | float(0)) * 60 %}
                          {{ 0 if diff < 0 or diff > 1440 else diff | round(0) | int }}

                        minutes_restantes_cycle: >-
                          {{ [duree_totale_cycle | int - minutes_filtrees_cycle | int, 0] | max }}

                        cycles_restants: >-
                          {{ v_nb_cycles | int - repeat.index | int + 1 }}

                        duree_ce_cycle: >-
                          {{ 0 if minutes_restantes_cycle <= 0 else (minutes_restantes_cycle / cycles_restants) | round(0) | int }}

                        intervalle_entre_cycles: >-
                          {% set pause = ((v_plage_minutes | int - duree_totale_cycle | int) / (v_nb_cycles | int)) | round(0) | int %}
                          {{ [pause, 5] | max }}

                        # Dépassement heure de fin (gère plages diurnes et nocturnes)
                        depasse_heure_fin: >-
                          {% set fin_cycle = now().hour * 60 + now().minute + (duree_ce_cycle | int) %}
                          {% set d = v_heure_debut_min | int %}
                          {% set f = v_heure_fin_min   | int %}
                          {% if f > d %}
                            {{ fin_cycle > f }}
                          {% else %}
                            {% if now().hour * 60 + now().minute >= d %}
                              {{ fin_cycle > 1440 + f }}
                            {% else %}
                              {{ fin_cycle > f }}
                            {% endif %}
                          {% endif %}

                    - action: input_number.set_value
                      target:
                        entity_id: !input input_duree_objectif
                      data:
                        value: "{{ duree_totale_cycle | int }}"

                    # Dépassement heure de fin
                    - if:
                        - condition: template
                          value_template: "{{ depasse_heure_fin }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "🕙 SPA — Cycle annulé"
                            message: "Le cycle {{ repeat.index }} / {{ v_nb_cycles }} dépasserait l'heure de fin. Session terminée."
                        - stop: "Dépassement heure de fin"

                    # Objectif déjà atteint
                    - if:
                        - condition: template
                          value_template: "{{ duree_ce_cycle | int <= 0 }}"
                      then:
                        - action: notify.persistent_notification
                          data:
                            title: "✅ SPA — Filtration terminée"
                            message: "Objectif atteint ({{ minutes_filtrees_cycle }} / {{ duree_totale_cycle }} min). Cycles restants annulés."
                        - if:
                            - condition: state
                              entity_id: !input switch_pompe
                              state: "on"
                          then:
                            - action: homeassistant.turn_off
                              target:
                                entity_id: !input switch_pompe
                            - delay:
                                seconds: 5
                        - if:
                            - condition: state
                              entity_id: !input binary_chauffage_actif
                              state: "off"
                          then:
                            - if:
                                - condition: template
                                  value_template: "{{ v_autoriser_ext }}"
                              then:
                                - action: homeassistant.turn_off
                                  target:
                                    entity_id: !input switch_power
                          else:
                            - action: notify.persistent_notification
                              data:
                                title: "♨️ SPA — Chauffage actif"
                                message: "Filtration terminée mais le chauffage est actif. Éteignez-le manuellement pour couper le SPA."
                        - stop: "Objectif atteint"

                      else:
                        # Lancement du cycle
                        - action: homeassistant.turn_on
                          target:
                            entity_id: !input switch_power
                        - delay:
                            seconds: 3
                        - action: homeassistant.turn_on
                          target:
                            entity_id: !input switch_pompe
                        - delay:
                            minutes: "{{ duree_ce_cycle | int }}"
                        - action: homeassistant.turn_off
                          target:
                            entity_id: !input switch_pompe
                        - action: input_number.set_value
                          target:
                            entity_id: !input input_cycle_en_cours
                          data:
                            value: "{{ repeat.index | int }}"

                        # Dernier cycle
                        - if:
                            - condition: template
                              value_template: "{{ repeat.index == v_nb_cycles | int }}"
                          then:
                            - if:
                                - condition: state
                                  entity_id: !input binary_chauffage_actif
                                  state: "on"
                              then:
                                - action: notify.persistent_notification
                                  data:
                                    title: "♨️ SPA — Filtration terminée, chauffage actif"
                                    message: "Filtration terminée ({{ duree_totale_cycle }} min). Chauffage actif : le SPA reste allumé."
                              else:
                                - if:
                                    - condition: template
                                      value_template: "{{ v_autoriser_ext }}"
                                  then:
                                    - delay:
                                        seconds: 10
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_power

                          # Entre deux cycles : power OFF + pause
                          else:
                            - if:
                                - condition: state
                                  entity_id: !input binary_chauffage_actif
                                  state: "off"
                              then:
                                - if:
                                    - condition: template
                                      value_template: "{{ v_autoriser_ext }}"
                                  then:
                                    - delay:
                                        seconds: 5
                                    - action: homeassistant.turn_off
                                      target:
                                        entity_id: !input switch_power
                            - delay:
                                minutes: "{{ intervalle_entre_cycles | int }}"
